# TW B2B — chat-log 인덱스 자동 갱신 워크플로
#
# 헌법 부합:
#   ② 무인 실행: chat-log 파일 push 즉시 자동 인덱스 재구축
#   ⑥ 사람용+AI용: _chat-logs/*.md (사람용) ↔ index.json (AI용 byCommit/byTask 매핑)
#   ⑧ 통합 관리: 단일 진실 출처 — admin-status.html이 이 인덱스만 읽음
#
# 트리거 (BL-VERCEL-DEPLOY-RACE-GUARD 단계 1 — 2026-05-08):
#   1. schedule: 5분마다 실행 (Vercel 배포 race 차단, 봇 commit 분리)
#   2. 수동 실행 (workflow_dispatch)
#   변경 사유: push trigger 시 사업 commit 1건 → 봇 commit 4~6건 폭증
#
# 실행 흐름:
#   1. checkout (full history — git log 기반 byCommit 자동 추출 위해)
#   2. Node 20 setup
#   3. node _os/scripts/build-chat-log-index.mjs 실행
#   4. _chat-logs/index.json 변경되었으면 자동 commit + push
#   5. self-trigger 방지 ([scan-bot] commit은 다시 트리거 안 함)

name: Auto Build Chat-Log Index

on:
  schedule:
    - cron: '*/5 * * * *'  # BL-VERCEL-DEPLOY-RACE-GUARD: 5분마다 (push trigger 폐지)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-chat-log-index:
    # self-trigger 방지: bot이 만든 commit은 스킵
    if: "!contains(github.event.head_commit.message, '[scan-bot]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git log 전체 필요 (byCommit 자동 추출)

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build chat-log index
        run: node _os/scripts/build-chat-log-index.mjs

      - name: Commit if changed
        run: |
          git config user.name "scan-bot"
          git config user.email "scan-bot@users.noreply.github.com"
          if git diff --quiet _chat-logs/index.json; then
            echo "✅ index.json 변경 없음 — skip commit"
          else
            git add _chat-logs/index.json
            git commit -m "[scan-bot] chat-log index 자동 갱신 [변경사유: chat-log 파일 또는 tasks.json 변경 → byCommit/byTask 매핑 재구축]"

            # Race condition 방지 — push 직전 원격 변경 흡수 (BL-CHATLOG-BOT-RACE)
            # 다른 봇(activity-bot/sync-bot/health-bot)이 동시에 push했을 가능성 흡수
            for attempt in 1 2 3; do
              if git push origin main; then
                echo "✅ index.json 자동 갱신 + push 완료 (시도 ${attempt})"
                break
              fi
              echo "⚠️ push 실패 (시도 ${attempt}) — pull --rebase 후 재시도"
              git pull --rebase --strategy-option=ours origin main || {
                echo "❌ rebase 충돌 — 수동 개입 필요"; exit 1;
              }
            done
          fi
