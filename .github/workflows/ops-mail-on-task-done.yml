# TW B2B — 작업 완료 시 ops 메일 자동 발송 봇
#
# 작업: BL-OPS-MAIL-AUTOBOT (헌법 부칙 8 — 자동 동기화 완성도 보강)
#
# 헌법 부합:
#   ② 무인 실행: tasks.json status 전환 자동 감지 → 메일 발송
#   ④ 전수 추적: 모든 발송이 tasks.json history에 mail_sent 마커 박힘
#   ⑤ 무인 검증: Resend response.id 확인 후만 성공 처리
#   ⑦ 상태 가시성: admin-status에서 mail_sent 마커 확인 가능
#
# 트리거:
#   1. main 브랜치에 tasks.json push 시 자동
#   2. workflow_dispatch — 수동 (밀린 메일 또는 디버그)
#
# 필요 secret:
#   - RESEND_API_KEY

name: ops-mail-on-task-done

on:
  push:
    branches: [main]
    paths:
      - 'tasks.json'
  workflow_dispatch:
    inputs:
      task_id:
        description: '메일 발송할 task ID (수동 트리거 시)'
        required: false
        default: ''
      force_send:
        description: '이미 mail_sent 마커 있어도 다시 보내기'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  send-mail:
    # ★ BL-OPS-MAIL-QUOTA-FIX (2026-05-12): 정식 활성화
    # 이전 사고(2026-05-10): tasks.json이 commit마다 변경 → 매번 메일 → Resend 100통 초과
    # 정식 fix 적용 완료:
    #   1) send-ops-mail.mjs 내부에 묶음 발송 (N건 → 1통)
    #   2) _ops-mail-state.json 빈도 제한 (1시간 내 재발송 차단)
    #   3) 일일 80통 한도 가드
    #   4) 아래 commit 메시지 필터로 봇 자동 commit은 트리거 자체 차단
    # 봇 commit 패턴: [scan-bot] [sync-bot] [health-bot] [auto-detect-bot] [activity-bot]
    # [auto-task-bot] [ops-mail-bot] 등 → tasks.json 변경해도 메일 안 보냄 (의미 없는 trigger 차단)
    if: |
      github.event_name == 'workflow_dispatch' || (
        !contains(github.event.head_commit.message, '[scan-bot]') &&
        !contains(github.event.head_commit.message, '[sync-bot]') &&
        !contains(github.event.head_commit.message, '[health-bot]') &&
        !contains(github.event.head_commit.message, '[auto-detect-bot]') &&
        !contains(github.event.head_commit.message, '[activity-bot]') &&
        !contains(github.event.head_commit.message, '[auto-task-bot]') &&
        !contains(github.event.head_commit.message, '[ops-mail-bot]')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Send completion mail
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MANUAL_TASK_ID: ${{ inputs.task_id }}
          FORCE_SEND: ${{ inputs.force_send }}
        run: node scripts/send-ops-mail.mjs
      
      - name: Commit mail_sent markers (race-condition resilient)
        run: |
          git config user.name "ops-mail-bot"
          git config user.email "ops-mail-bot@gohotelwinners.com"
          git add tasks.json
          if git diff --cached --quiet; then
            echo "No mail_sent markers to commit"
            exit 0
          fi
          git commit -m "[ops-mail-bot] tasks.json mail_sent 마커 박음"
          # 다른 봇 commit과 race 시 최대 5회 재시도
          for i in 1 2 3 4 5; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push attempt $i failed, retrying..."
            sleep 2
          done
          echo "Push failed after 5 attempts"
          exit 1
