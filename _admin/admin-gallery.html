<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Page Gallery — TravelWinners B2B Admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="/shared.css">
<style>
  body { background:#0f172a; color:#e2e8f0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; margin:0; padding:0; }
  .gh-shell { max-width:1400px; margin:0 auto; padding:24px; }
  .gh-h1 { font-size:28px; font-weight:700; margin:0 0 8px; }
  .gh-sub { color:#94a3b8; font-size:14px; margin:0 0 24px; }
  .gh-toolbar { display:flex; gap:12px; align-items:center; margin-bottom:24px; flex-wrap:wrap; }
  .gh-toolbar input { background:#1e293b; border:1px solid #334155; color:#e2e8f0; padding:8px 12px; border-radius:6px; font-size:14px; min-width:240px; }
  .gh-toolbar button { background:#3b82f6; color:#fff; border:0; padding:8px 16px; border-radius:6px; cursor:pointer; font-size:14px; }
  .gh-toolbar button:hover { background:#2563eb; }
  .gh-toolbar .gh-info { color:#64748b; font-size:13px; margin-left:auto; }

  .gh-section { margin-bottom:32px; }
  .gh-section-h { font-size:18px; font-weight:600; margin:0 0 12px; color:#cbd5e1; display:flex; align-items:center; gap:8px; }
  .gh-section-h .gh-count { background:#334155; color:#94a3b8; font-size:12px; padding:2px 8px; border-radius:10px; font-weight:400; }

  .gh-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
  .gh-card { background:#1e293b; border:1px solid #334155; border-radius:10px; overflow:hidden; transition:transform .15s,border-color .15s; }
  .gh-card:hover { transform:translateY(-2px); border-color:#475569; }
  .gh-thumb { width:100%; aspect-ratio:16/10; background:#0f172a; overflow:hidden; position:relative; display:flex; align-items:center; justify-content:center; }
  .gh-thumb img { width:100%; height:100%; object-fit:cover; object-position:top; }
  .gh-thumb-empty { color:#475569; font-size:13px; text-align:center; padding:16px; }
  .gh-thumb-static { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  .gh-thumb-iframe { width:100%; height:100%; position:absolute; inset:0; background:#fff; overflow:hidden; }
  /* iframe은 데스크톱(1280×800)으로 렌더링하고 컨테이너 폭에 맞춰 CSS 변수로 스케일 */
  .gh-thumb-iframe iframe {
    border:0; display:block;
    width:1280px; height:800px;
    transform: scale(var(--gh-iframe-scale, 0.4));
    transform-origin: top left;
  }
  .gh-btn-act { background:#dc2626 !important; color:#fff !important; border-color:#dc2626 !important; }
  .gh-card.previewing .gh-thumb { aspect-ratio:auto; }
  .gh-body { padding:14px 16px; }
  .gh-name { font-size:16px; font-weight:600; margin:0 0 4px; color:#f1f5f9; }
  .gh-path { font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12px; color:#64748b; margin:0 0 8px; }
  .gh-purpose { font-size:13px; color:#94a3b8; margin:0 0 12px; line-height:1.5; }
  .gh-meta { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .gh-badge { font-size:11px; padding:3px 8px; border-radius:10px; font-weight:500; }
  .gh-when { font-size:12px; color:#64748b; margin-bottom:12px; }
  .gh-when strong { color:#94a3b8; }
  .gh-notes { font-size:12px; color:#fbbf24; background:rgba(251,191,36,.08); padding:8px 10px; border-radius:6px; margin-bottom:12px; line-height:1.5; }
  .gh-actions { display:flex; gap:8px; }
  .gh-btn { flex:1; padding:8px 10px; border-radius:6px; font-size:13px; text-align:center; text-decoration:none; cursor:pointer; border:0; }
  .gh-btn-pri { background:#3b82f6; color:#fff; }
  .gh-btn-pri:hover { background:#2563eb; }
  .gh-btn-sec { background:#334155; color:#cbd5e1; }
  .gh-btn-sec:hover { background:#475569; }
  .gh-btn[disabled] { opacity:.4; cursor:not-allowed; }

  .gh-modal { position:fixed; inset:0; background:rgba(0,0,0,.85); display:none; align-items:center; justify-content:center; z-index:1000; padding:20px; }
  .gh-modal.show { display:flex; }
  .gh-modal-inner { background:#1e293b; border-radius:12px; max-width:1200px; width:100%; max-height:90vh; overflow:auto; padding:20px; }
  .gh-modal-h { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .gh-modal img { max-width:100%; height:auto; display:block; border-radius:6px; border:1px solid #334155; }
  .gh-modal-x { background:#dc2626; color:#fff; border:0; padding:6px 12px; border-radius:6px; cursor:pointer; }

  .gh-deny { text-align:center; padding:80px 20px; }
  .gh-deny h1 { color:#dc2626; }
  .gh-deny a { color:#3b82f6; }

  @media (max-width:640px){
    .gh-grid { grid-template-columns:1fr; }
  }
</style>
<!-- ★ BL-ADMIN-LIGHTMODE step5+6: admin 공통 스킨 + 토글 자동 주입 -->
<link rel="stylesheet" href="/_os/skins/admin-skin.css">
<script src="/_os/skins/admin-theme-toggle.js" defer></script>
</head>
<body>
<div class="gh-shell" id="root">
  <div class="gh-deny" style="text-align:center;padding:40px 20px;">
    <h1 id="gh-loading-title" style="color:#dc2626;">Loading...</h1>
    <p id="gh-loading-step" style="color:#94a3b8;margin-top:8px;">⏳ 1/3 — 권한 확인 중</p>
    <div style="max-width:280px;margin:16px auto 0;height:4px;background:rgba(148,163,184,0.15);border-radius:2px;overflow:hidden;">
      <div id="gh-loading-bar" style="height:100%;background:linear-gradient(90deg,#6366f1,#ec4899);width:33%;transition:width 0.3s;"></div>
    </div>
    <p style="color:#64748b;font-size:11px;margin-top:14px;">평균 1-2초 소요 (Supabase 인증 + 매니저 권한 검증)</p>
  </div>
</div>

<div class="gh-modal" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="gh-modal-inner">
    <div class="gh-modal-h">
      <h3 id="modal-title" style="margin:0;color:#f1f5f9"></h3>
      <button class="gh-modal-x" onclick="closeModal()">닫기</button>
    </div>
    <img id="modal-img" src="" alt="">
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/shared.js?v=3"></script>
<script type="module">
import { PAGES, STATUS_BADGES, AUDIENCE_BADGES } from '/scripts/pages-meta.mjs';

(async function init(){
  const setStep = (n, label, pct) => {
    const stepEl = document.getElementById('gh-loading-step');
    const barEl = document.getElementById('gh-loading-bar');
    if (stepEl) stepEl.textContent = `⏳ ${n}/3 — ${label}`;
    if (barEl) barEl.style.width = pct + '%';
  };

  // 인증은 middleware.js (Edge Routing Middleware) 단일 게이트가 처리.
  // 이 페이지에 도달했다는 것 = 이미 admin 검증 통과. RPC 왕복 0건.
  // BL-ADMIN-AUTH-PERF (D-021) — A-2 정석.
  setStep(1, 'Supabase 클라이언트 확인', 50);
  let userEmail = '';
  if (window.TW && window.TW.sb) {
    try {
      const { data: { session } } = await window.TW.sb.auth.getSession();
      if (session) userEmail = session.user.email;
    } catch (e) { /* user 정보 없어도 페이지는 표시 — 인증은 이미 통과 */ }
  }

  setStep(2, '페이지 데이터 + BL 매핑 로드', 100);

  // ★ BL-DEPENDENCY-MAP (2026-05-13): tasks.json에서 BL → target_pages 매핑 fetch
  //   각 페이지 카드에 "이 페이지에 박힐 BL N건" 표시
  let blByPage = {};  // { '/sales.html': [{id, title, priority, size}], ... }
  try {
    const tasksRes = await fetch('/tasks.json?t=' + Date.now(), {
      cache: 'no-store',
      headers: { 'Cache-Control': 'no-cache, no-store, must-revalidate' }
    });
    if (tasksRes.ok) {
      const tasksData = await tasksRes.json();
      (tasksData.tasks || []).forEach(t => {
        if (!t || t.status !== 'pending') return;
        const targets = Array.isArray(t.target_pages) ? t.target_pages : [];
        targets.forEach(page => {
          if (page.startsWith('__')) return;  // __os__, __email__ 등은 페이지 카드 안 박음
          if (!blByPage[page]) blByPage[page] = [];
          blByPage[page].push({
            id: t.id,
            title: t.title || '',
            priority: t.priority || 'P9',
            size: t.size || '?',
            hours: t.estimated_hours || 0,
          });
        });
      });
      // 각 페이지 BL 우선순위 정렬 (P0 먼저)
      Object.keys(blByPage).forEach(k => {
        blByPage[k].sort((a, b) => (a.priority || 'P9').localeCompare(b.priority || 'P9'));
      });
    }
  } catch (e) {
    console.warn('[BL-DEPENDENCY-MAP] tasks.json fetch 실패 — BL 카운트 없이 진행', e);
  }

  render(userEmail, blByPage);
})();

function render(adminEmail, blByPage = {}) {
  // ★ BL-DEPENDENCY-MAP (2026-05-13): 페이지별 BL 카운트
  // blByPage = { '/sales.html': [{id, title, priority, size}], ... }
  const groups = {
    'live':           [],
    'partial':        [],
    'needs-refactor': [],
    'new':            [],
    'planned':        [],
    'archived':       [],
  };
  PAGES.forEach(p => { (groups[p.status] || (groups[p.status] = [])).push(p); });

  const sectionTitle = {
    'live':           '🟢 라이브 페이지',
    'partial':        '🟡 부분 완성',
    'needs-refactor': '🟠 리팩터 필요',
    'new':            '🔵 신설',
    'planned':        '⚪ 만들 예정 (BACKLOG)',
    'archived':       '⚫ 보관',
  };

  const sectionsHtml = Object.entries(groups)
    .filter(([k, list]) => list.length > 0)
    .map(([key, list]) => `
      <section class="gh-section">
        <h2 class="gh-section-h">${sectionTitle[key] || key} <span class="gh-count">${list.length}</span></h2>
        <div class="gh-grid">${list.map(p => cardHtml(p, blByPage[p.path] || [])).join('')}</div>
      </section>
    `).join('');

  document.getElementById('root').innerHTML = `
    <h1 class="gh-h1">📸 Page Gallery</h1>
    <p class="gh-sub">TravelWinners B2B — 라이브 사이트의 모든 페이지를 한눈에. <code style="color:#94a3b8">${adminEmail}</code></p>

    <div class="gh-toolbar">
      <input type="text" id="search" placeholder="페이지명 또는 경로 검색...">
      <button onclick="window.location.href='/admin.html'">← 관리자 콘솔</button>
      <span class="gh-info">총 ${PAGES.length}개 페이지 · 마지막 캡처: ${getLastCaptureDate()}</span>
    </div>

    ${sectionsHtml}
  `;

  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase().trim();
    document.querySelectorAll('.gh-card').forEach(card => {
      const text = card.dataset.search || '';
      card.style.display = (!q || text.includes(q)) ? '' : 'none';
    });
  });
}

function cardHtml(p, bls = []) {
  const name = p.path.replace(/^\//, '').replace(/\.html$/, '');
  const thumbSrc = `/docs/screenshots/${name}.png`;
  // ★ 헌법 12조 fallback 가드 — 매핑 없어도 깨지지 않게
  const statusBadge = STATUS_BADGES[p.status] || { label: '❓ ' + (p.status || 'unknown'), color: '#6b7280' };
  const audienceBadge = AUDIENCE_BADGES[p.audience] || { label: '❓ ' + (p.audience || 'unknown'), color: '#6b7280' };
  const searchText = (p.path + ' ' + p.name + ' ' + p.purpose + ' ' + (p.notes || '')).toLowerCase();

  // ★ BL-DEPENDENCY-MAP (2026-05-13): 이 페이지에 박힐 BL 박스
  const blCount = bls.length;
  const totalHours = bls.reduce((sum, b) => sum + (b.hours || 0), 0);
  const p0Count = bls.filter(b => b.priority === 'P0').length;

  let blBoxHtml = '';
  if (blCount > 0) {
    const blListItems = bls.slice(0, 5).map(b => `
      <li style="padding:4px 8px; font-size:11px; border-radius:4px; background:rgba(255,255,255,0.05); margin-bottom:3px;">
        <span style="display:inline-block; min-width:28px; font-weight:700; color:${b.priority === 'P0' ? '#dc2626' : b.priority === 'P1' ? '#f59e0b' : '#6b7280'}">${b.priority}</span>
        <span style="color:#cbd5e1; font-size:10.5px;">${escapeHtml(b.id)}</span><br>
        <span style="color:#94a3b8; font-size:10.5px; padding-left:32px; display:block;">${escapeHtml(b.title.slice(0, 60))}${b.title.length > 60 ? '...' : ''}</span>
      </li>
    `).join('');
    const more = blCount > 5 ? `<li style="font-size:10.5px; color:#94a3b8; text-align:center; padding:4px;">+ ${blCount - 5}개 더</li>` : '';

    blBoxHtml = `
      <div style="margin-top:10px; padding:10px 12px; background:rgba(99,102,241,0.08); border-left:3px solid #6366f1; border-radius:4px;">
        <div style="font-size:11.5px; font-weight:600; color:#a5b4fc; margin-bottom:6px;">
          🧩 이 페이지에 박힐 BL <strong>${blCount}건</strong>
          ${p0Count > 0 ? `<span style="background:#dc2626; color:#fff; font-size:10px; padding:1px 6px; border-radius:3px; margin-left:4px;">P0 ${p0Count}</span>` : ''}
          ${totalHours > 0 ? `<span style="color:#94a3b8; font-size:10.5px; margin-left:4px;">· 약 ${totalHours}h</span>` : ''}
        </div>
        <ul style="list-style:none; padding:0; margin:0;">${blListItems}${more}</ul>
      </div>
    `;
  } else if (p.status !== 'retired' && p.status !== 'archived') {
    blBoxHtml = `
      <div style="margin-top:10px; padding:8px 12px; background:rgba(34,197,94,0.05); border-left:3px solid #16a34a; border-radius:4px; font-size:11px; color:#86efac;">
        ✅ 이 페이지에 대기 중인 BL 없음 (정상 운영 중)
      </div>
    `;
  }

  // iframe 라이브 미리보기는 status가 planned가 아닌 모든 페이지에서 사용 가능
  // (admin이 로그인된 상태에서 same-origin iframe은 자동으로 세션 쿠키를 공유)
  const canLivePreview = p.status !== 'planned';
  const cardId = 'card-' + name.replace(/[^a-z0-9]/gi, '_');

  const thumbInner = p.capture
    ? `<img src="${thumbSrc}" alt="${escapeHtml(p.name)}" onerror="this.parentElement.querySelector('.gh-thumb-img').style.display='none';this.parentElement.querySelector('.gh-thumb-empty-fallback').style.display='flex';" class="gh-thumb-img">
       <div class="gh-thumb-empty gh-thumb-empty-fallback" style="display:none">캡처 없음<br><small>아래 '라이브 미리보기' 버튼 클릭</small></div>`
    : `<div class="gh-thumb-empty">${p.audience === 'planned' ? '아직 없음' : '🔒 캡처 대기 중'}<br><small>GitHub Actions 자동 캡처 후 표시<br>또는 '라이브 보기'로 새 탭에서 확인</small></div>`;

  const thumbHtml = `<div class="gh-thumb-static">${thumbInner}</div>
    <div class="gh-thumb-iframe" id="${cardId}-iframe-wrap" style="display:none">
      <iframe id="${cardId}-iframe" src="about:blank" loading="lazy" referrerpolicy="same-origin" sandbox="allow-same-origin allow-scripts allow-forms allow-popups"></iframe>
    </div>`;

  const liveBtn = p.status === 'planned'
    ? `<button class="gh-btn gh-btn-sec" disabled>아직 없음</button>`
    : `<a class="gh-btn gh-btn-pri" href="${p.path}" target="_blank">라이브 보기</a>`;

  const previewBtn = canLivePreview
    ? `<button class="gh-btn gh-btn-sec" onclick="toggleLivePreview('${cardId}','${p.path}', this)">👁️ 라이브 미리보기</button>`
    : `<button class="gh-btn gh-btn-sec" disabled>아직 없음</button>`;

  const captureBtn = p.capture
    ? `<button class="gh-btn gh-btn-sec" onclick="openModal('${name}','${escapeHtml(p.name)}')">📷 큰 캡처</button>`
    : '';

  // BL-015 / D-028 — 이력 보기 버튼 (archive 폴더에 옛 캡처 있을 때만 활성)
  // 실제 archive 존재 여부는 클릭 시 fetch로 확인 (성능상 카드 렌더링 시점에는 단순 표시)
  const historyBtn = p.capture
    ? `<button class="gh-btn gh-btn-sec" onclick="openHistoryModal('${name}','${escapeHtml(p.name)}')" title="archive 폴더에 쌓인 옛 캡처 보기">📅 이력 보기</button>`
    : '';

  return `
    <article class="gh-card" id="${cardId}" data-search="${escapeAttr(searchText)}">
      <div class="gh-thumb">${thumbHtml}</div>
      <div class="gh-body">
        <h3 class="gh-name">${escapeHtml(p.name)}</h3>
        <p class="gh-path">${escapeHtml(p.path)}</p>
        <p class="gh-purpose">${escapeHtml(p.purpose)}</p>
        <div class="gh-meta">
          <span class="gh-badge" style="background:${audienceBadge.color};color:#fff">${audienceBadge.label}</span>
          <span class="gh-badge" style="background:${statusBadge.color};color:#fff">${statusBadge.label}</span>
        </div>
        <p class="gh-when"><strong>표시 조건:</strong> ${escapeHtml(p.visibleWhen)}</p>
        ${p.notes ? `<p class="gh-notes">📝 ${escapeHtml(p.notes)}</p>` : ''}
        ${blBoxHtml}
        <div class="gh-actions">${liveBtn}${previewBtn}${captureBtn}${historyBtn}</div>
      </div>
    </article>`;
}

// iframe 라이브 미리보기 토글: 같은 도메인이라 admin 세션 쿠키가 자동 전달됨
window.toggleLivePreview = function(cardId, path, btn) {
  const wrap = document.getElementById(cardId + '-iframe-wrap');
  const iframe = document.getElementById(cardId + '-iframe');
  const card = document.getElementById(cardId);
  const staticThumb = card.querySelector('.gh-thumb-static');
  const isVisible = wrap.style.display !== 'none';

  if (isVisible) {
    wrap.style.display = 'none';
    staticThumb.style.display = '';
    iframe.src = 'about:blank';
    btn.innerHTML = '👁️ 라이브 미리보기';
    btn.classList.remove('gh-btn-act');
    card.classList.remove('previewing');
    // 인라인 스타일 정리
    card.style.removeProperty('--gh-iframe-scale');
    const thumb = card.querySelector('.gh-thumb');
    thumb.style.height = '';
  } else {
    staticThumb.style.display = 'none';
    wrap.style.display = '';
    // 카드 너비 측정해서 정확히 1280px 페이지가 들어가도록 스케일 계산
    const thumb = card.querySelector('.gh-thumb');
    const cardW = thumb.getBoundingClientRect().width;
    const scale = Math.min(cardW / 1280, 0.6);  // 최대 0.6배까지만 (너무 크면 가독성 저하)
    card.style.setProperty('--gh-iframe-scale', scale.toFixed(4));
    // 카드 높이는 1280×800 비율 유지 (800 × scale)
    thumb.style.height = Math.round(800 * scale) + 'px';
    // 캐시 우회 위해 timestamp 추가
    iframe.src = path + (path.includes('?') ? '&' : '?') + '_pv=' + Date.now();
    btn.innerHTML = '✕ 미리보기 닫기';
    btn.classList.add('gh-btn-act');
    card.classList.add('previewing');
  }
};

function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return escapeHtml(s); }

function getLastCaptureDate() {
  // 첫 카드의 이미지 fetch는 비동기라 표시는 단순화 — 추후 자동 갱신 시 server timestamp 사용
  return '최근';
}

window.openModal = function(name, title) {
  document.getElementById('modal-title').textContent = title + ' (' + name + '.png)';
  document.getElementById('modal-img').src = '/docs/screenshots/' + name + '.png';
  document.getElementById('modal').classList.add('show');
};
window.closeModal = function() {
  document.getElementById('modal').classList.remove('show');
};

// BL-015 / D-028 — 이력 모달 (archive 폴더에 쌓인 날짜별 옛 캡처 보기)
// archive 경로 형식: /docs/screenshots/archive/{name}-{YYYYMMDD}.png
window.openHistoryModal = async function(name, title) {
  const modal = document.getElementById('modal');
  const titleEl = document.getElementById('modal-title');
  const imgEl = document.getElementById('modal-img');
  const inner = modal.querySelector('.gh-modal-inner');

  titleEl.textContent = '📅 ' + title + ' — 변경 이력';
  imgEl.style.display = 'none';

  // 이력 컨테이너 신설 (재사용)
  let histEl = document.getElementById('history-container');
  if (!histEl) {
    histEl = document.createElement('div');
    histEl.id = 'history-container';
    histEl.style.cssText = 'margin-top:16px';
    inner.appendChild(histEl);
  }
  histEl.innerHTML = '<p style="color:#94a3b8;text-align:center;padding:24px;">⏳ 이력 캡처 검색 중...</p>';
  modal.classList.add('show');

  // archive 폴더 PNG 목록 fetch (GitHub raw API 또는 정적 manifest)
  // 최초 구현: 최근 30일 시도 (날짜 역순, 존재하는 것만 표시)
  const today = new Date();
  const candidates = [];
  for (let i = 0; i < 60; i++) {
    const d = new Date(today.getTime() - i * 86400000);
    const ymd = d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2, '0');
    candidates.push({ ymd, label: `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` });
  }

  // 병렬로 HEAD 요청 (존재하는 것만 필터)
  const checks = await Promise.all(candidates.map(c =>
    fetch(`/docs/screenshots/archive/${name}-${c.ymd}.png`, { method: 'HEAD' })
      .then(r => r.ok ? c : null)
      .catch(() => null)
  ));
  const existing = checks.filter(Boolean);

  if (existing.length === 0) {
    histEl.innerHTML = `
      <div style="background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.3);border-radius:8px;padding:16px;margin-top:8px">
        <p style="color:#fbbf24;margin:0 0 8px;font-weight:600">📭 아직 보관된 이력이 없습니다</p>
        <p style="color:#94a3b8;font-size:13px;margin:0;line-height:1.6">
          capture-bot이 매일 KST 03:00 또는 페이지 변경 push 시 자동으로 옛 캡처를
          <code style="color:#cbd5e1">docs/screenshots/archive/</code> 폴더에 누적합니다.<br>
          첫 캡처 후 24시간 정도 지나면 BEFORE/AFTER 비교가 가능해집니다.
        </p>
      </div>`;
    return;
  }

  // 현재 + 이력 나란히 표시 (현재 = 좌측, 이력 = 우측 슬라이더)
  const currentSrc = `/docs/screenshots/${name}.png`;
  histEl.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
      <div>
        <p style="color:#22c55e;font-size:12px;font-weight:600;margin:0 0 6px">🟢 현재 (AFTER)</p>
        <img src="${currentSrc}" alt="현재" style="width:100%;border-radius:6px;border:1px solid #334155">
      </div>
      <div>
        <p style="color:#3b82f6;font-size:12px;font-weight:600;margin:0 0 6px">🔵 옛 버전 (BEFORE) — <select id="hist-date" style="background:#1e293b;color:#cbd5e1;border:1px solid #334155;border-radius:4px;padding:2px 6px;font-size:11px">${existing.map((c, i) => `<option value="${c.ymd}"${i===0?' selected':''}>${c.label}</option>`).join('')}</select></p>
        <img id="hist-img" src="/docs/screenshots/archive/${name}-${existing[0].ymd}.png" alt="이력" style="width:100%;border-radius:6px;border:1px solid #334155">
      </div>
    </div>
    <p style="color:#64748b;font-size:11px;text-align:center;margin:0">${existing.length}일치 이력 누적 · 가장 최근 → 옛순 정렬</p>
  `;

  // 날짜 선택 바인딩
  document.getElementById('hist-date').addEventListener('change', (e) => {
    document.getElementById('hist-img').src = `/docs/screenshots/archive/${name}-${e.target.value}.png`;
  });
};

// 기존 closeModal에 이력 컨테이너 정리 추가
const _origCloseModal = window.closeModal;
window.closeModal = function() {
  const histEl = document.getElementById('history-container');
  if (histEl) histEl.innerHTML = '';
  const imgEl = document.getElementById('modal-img');
  if (imgEl) imgEl.style.display = '';
  _origCloseModal();
};
</script>
</body>
</html>
