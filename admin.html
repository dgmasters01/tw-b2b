*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f7f4;--cd:#fff;--tx:#1a1a1a;--sb:#666;--ht:#999;--bd:#e8e6e1;--ac:#534AB7;--tl:#1D9E75;--cr:#D85A30;--bl:#378ADD;--gd:#D4A13E}

.W{max-width:960px;margin:0 auto;padding:20px 16px}

.H h1{font-size:22px;font-weight:700}
.H .meta{font-size:11px;color:var(--ht);text-align:right}
.H .meta .up{color:var(--ac);font-weight:500}

.TB{display:flex;gap:4px;border-bottom:2px solid var(--bd);margin-bottom:18px;overflow-x:auto}
.TB button{background:none;border:none;padding:10px 14px;font-size:13px;color:var(--sb);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:inherit}

td{padding:8px 6px;border-bottom:1px solid var(--bd)}
td.r,th.r{text-align:right}
tr.ck{cursor:pointer}
tr.ck:hover{background:#faf9f6}
.rk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700}

.r2{background:#F0F0F2;color:#555}
.r3{background:#FDE8D5;color:#A84B20}
.rn{background:#F8F6F0;color:var(--sb)}
.st{color:var(--gd);font-size:11px;letter-spacing:1px}
.st-em{color:#ddd}
.bg{font-size:10px;padding:2px 7px;border-radius:4px;display:inline-block;font-weight:500}
.bg-kr{background:#EAF2FD;color:#2056A8}
.bg-jp{background:#FDE8E0;color:#A84B20}
.bg-tw{background:#FFF3D6;color:#8A6500}
.bg-vn{background:#E0F2E8;color:#1D6B45}
.bg-en{background:#F0E6F8;color:#6030A0}
.bg-tw2{background:#FDE8F0;color:#A02060}
.bg-ap{background:#E8E6E1;color:#555}
.bg-dep{background:#E0F2E8;color:#1D6B45}
.bg-chg{background:#FFF3D6;color:#8A6500}
.bg-cnf{background:#EAF2FD;color:#2056A8}
.chart-wrap{position:relative;height:260px;margin-top:6px}
.chart-wrap.sm{height:180px}
.search{width:100%;padding:8px 12px;border:1px solid var(--bd);border-radius:7px;font-size:13px;font-family:inherit;margin-bottom:10px}
.search:focus{outline:none;border-color:var(--ac)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px;font-size:13px;padding:12px 14px;background:#faf9f6;border:1px dashed var(--bd);border-radius:8px}
.info-grid .ik{color:var(--ht);font-size:11px}
.info-grid .iv{color:var(--tx);font-weight:500}
.info-grid .nd{color:var(--ht);font-style:italic;font-weight:400;font-size:12px}
.info-note{font-size:11px;color:var(--ht);margin-top:6px;font-style:italic}
.pitch{background:#faf9f6;border-left:3px solid var(--ac);padding:11px 14px;margin-top:10px;font-size:12px;line-height:1.6;border-radius:4px;color:var(--sb)}
.pitch strong{color:var(--tx)}
@media(max-width:640px){.ST{grid-template-columns:repeat(2,1fr)}.ST .vl{font-size:16px}.g2{grid-template-columns:1fr}}
</style></head><body>

// ============ URL 라우팅 ============
function parseHash(){
  var h = location.hash.slice(1);
  var st = {tab:'ov',co:null,ci:null,coOfCi:null,ht:null,ciOfHt:null,coOfHt:null};
  if(!h) return st;
  var parts = h.split('/');
  st.tab = parts[0] || 'ov';
  for(var i=1;i<parts.length;i++){
    var p = parts[i];
    var eq = p.indexOf(':');
    if(eq<0) continue;
    var k = p.substring(0,eq);
    var v = decodeURIComponent(p.substring(eq+1));
    if(k==='co') st.co = v;
    else if(k==='ci'){ var cv=v.split('|'); st.ci=cv[0]; st.coOfCi=cv[1]||''; }
    else if(k==='ht'){ var hv=v.split('|'); st.ht=hv[0]; st.ciOfHt=hv[1]||''; st.coOfHt=hv[2]||''; }
  }
  return st;
}
function buildHash(st){
  var parts = [st.tab];
  if(st.co) parts.push('co:'+encodeURIComponent(st.co));
  if(st.ci) parts.push('ci:'+encodeURIComponent(st.ci+'|'+(st.coOfCi||'')));
  if(st.ht) parts.push('ht:'+encodeURIComponent(st.ht+'|'+(st.ciOfHt||'')+'|'+(st.coOfHt||'')));
  return '#'+parts.join('/');
}
function nav(partial){
  var cur = parseHash();
  for(var k in partial) cur[k] = partial[k];
  var newHash = buildHash(cur);
  if(location.hash !== newHash){
    history.pushState(cur,'',newHash);
    render();
  }else{
    render();
  }
}
window.addEventListener('popstate',function(){render()});

// ============ 이벤트 위임 ============
document.addEventListener('click', function(e){
  var t = e.target;
  while(t && t !== document.body){
    if(t.dataset && t.dataset.action){
      var a = t.dataset.action;
      if(a==='tab'){ nav({tab:t.dataset.tab,co:null,ci:null,coOfCi:null,ht:null,ciOfHt:null,coOfHt:null}); return; }
      if(a==='co'){ nav({co:t.dataset.co,ci:null,coOfCi:null,ht:null,ciOfHt:null,coOfHt:null}); return; }
      if(a==='ci'){ nav({ci:t.dataset.ci,coOfCi:t.dataset.coc,co:null,ht:null,ciOfHt:null,coOfHt:null}); return; }
      if(a==='ht'){ nav({ht:t.dataset.ht,ciOfHt:t.dataset.hci,coOfHt:t.dataset.hco,co:null,ci:null,coOfCi:null}); return; }
      if(a==='back-tab'){ nav({tab:t.dataset.tab,co:null,ci:null,coOfCi:null,ht:null,ciOfHt:null,coOfHt:null}); return; }
      if(a==='back-co'){ nav({co:t.dataset.co,ci:null,coOfCi:null,ht:null,ciOfHt:null,coOfHt:null}); return; }
      if(a==='back-ci'){ nav({ci:t.dataset.ci,coOfCi:t.dataset.coc,co:null,ht:null,ciOfHt:null,coOfHt:null}); return; }
      return;
    }
    t = t.parentElement;
  }
});

function rBC(st){
  var el = document.getElementById('bc');
  var parts = [];
  var tabDef = TABS.filter(function(t){return t.id===st.tab})[0];
  var tabLabel = tabDef ? tabDef.l : st.tab;

  if(st.co){
    parts.push('<a data-action="back-tab" data-tab="'+st.tab+'">'+tabLabel+'</a>');
    if(st.ci){
      parts.push('<span class="sep">›</span>');
      parts.push('<a data-action="back-co" data-co="'+H(st.co)+'">'+H(st.co)+'</a>');
      if(st.ht){
        parts.push('<span class="sep">›</span>');
        parts.push('<a data-action="back-ci" data-ci="'+H(st.ci)+'" data-coc="'+H(st.coOfCi||'')+'">'+H(st.ci)+'</a>');
        parts.push('<span class="sep">›</span>');
        parts.push('<span>'+H(st.ht)+'</span>');
      }else{
        parts.push('<span class="sep">›</span>');
        parts.push('<span>'+H(st.ci)+'</span>');
      }
    }else{
      parts.push('<span class="sep">›</span>');
      parts.push('<span>'+H(st.co)+'</span>');
    }
  }else if(st.ci){
    parts.push('<a data-action="back-tab" data-tab="'+st.tab+'">'+tabLabel+'</a>');
    parts.push('<span class="sep">›</span>');
    if(st.ht){
      parts.push('<a data-action="back-ci" data-ci="'+H(st.ci)+'" data-coc="'+H(st.coOfCi||'')+'">'+H(st.ci)+' ('+H(st.coOfCi||'')+')</a>');
      parts.push('<span class="sep">›</span>');
      parts.push('<span>'+H(st.ht)+'</span>');
    }else{
      parts.push('<span>'+H(st.ci)+' ('+H(st.coOfCi||'')+')</span>');
    }
  }else if(st.ht){
    parts.push('<a data-action="back-tab" data-tab="'+st.tab+'">'+tabLabel+'</a>');
    parts.push('<span class="sep">›</span>');
    parts.push('<span>'+H(st.ht)+'</span>');
  }

  if(parts.length){
    el.innerHTML = parts.join(' ');
    el.style.display = 'flex';
  }else{
    el.innerHTML = '';
    el.style.display = 'none';
  }
}

// Admin gate
(function(){
  var ADMIN_PW = 'tw2026admin';
  var gate = document.getElementById('admin-gate');
  var pwInput = document.getElementById('admin-pw');
  var errEl = document.getElementById('admin-err');
  var enterBtn = document.getElementById('admin-enter');

  if(sessionStorage.getItem('tw-admin-auth') === 'true') {
    gate.style.display = 'none';
    render();
    return;
  }

  enterBtn.addEventListener('click', function() {
    if(pwInput.value === ADMIN_PW) {
      sessionStorage.setItem('tw-admin-auth', 'true');
      gate.style.display = 'none';
      render();
    } else {
      errEl.style.display = 'block';
      pwInput.style.borderColor = '#D85A30';
    }
  });
  pwInput.addEventListener('keydown', function(e) {
    if(e.key === 'Enter') enterBtn.click();
  });
})();
