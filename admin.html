<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelWinners — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f5f5f7;font-family:'DM Sans','Noto Sans KR',sans-serif;color:#1a1a1a;min-height:100vh}
.ad-shell{max-width:1400px;margin:0 auto}
.ad-topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:#1a1a1a;color:#fff}
.ad-logo{display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none}
.ad-logo-icon{width:32px;height:32px;background:#534AB7;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.ad-logo-text{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
.ad-badge{background:#D85A30;color:#fff;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:.5px}
.ad-nav-right{display:flex;gap:12px;align-items:center;font-size:13px}
.ad-logout{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12.5px;font-family:inherit}
.ad-logout:hover{background:rgba(255,255,255,.2)}
.ad-main{padding:24px}
.ad-h1{font-family:'Fraunces',serif;font-size:24px;margin:0 0 4px;font-weight:600}
.ad-h1-sub{color:#777;font-size:13.5px;margin:0 0 24px}
.ad-stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px}
.ad-stat{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:16px}
.ad-stat-lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.ad-stat-val{font-size:24px;font-weight:700}
.ad-card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:20px;margin-bottom:18px}
.ad-card-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.ad-card-h h3{margin:0;font-size:16px;font-weight:600}
.ad-filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ad-filter{padding:6px 14px;border-radius:18px;font-size:12.5px;cursor:pointer;background:#f0f0f0;color:#555;border:none;font-family:inherit;font-weight:500}
.ad-filter.active{background:#1a1a1a;color:#fff}
.ad-table-wrap{overflow-x:auto}
.ad-table{width:100%;border-collapse:collapse;font-size:13px}
.ad-table th{text-align:left;padding:10px 12px;background:#fafafa;color:#666;font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid #eee}
.ad-table td{padding:14px 12px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.ad-table tr:hover{background:#fafafa}
.ad-status{display:inline-block;padding:3px 10px;border-radius:14px;font-size:11px;font-weight:600;color:#fff}
.ad-btn{padding:6px 14px;border-radius:6px;font-size:12.5px;cursor:pointer;border:none;font-family:inherit;font-weight:600;margin-right:4px}
.ad-btn-primary{background:#1a1a1a;color:#fff}
.ad-btn-primary:hover{background:#000}
.ad-btn-success{background:#0a7c3a;color:#fff}
.ad-btn-warning{background:#f0a830;color:#fff}
.ad-btn-danger{background:#c93030;color:#fff}
.ad-btn-secondary{background:#f0f0f0;color:#1a1a1a}
.ad-btn-secondary:hover{background:#e0e0e0}
.ad-empty{text-align:center;padding:50px;color:#888}
.ad-loader{display:inline-block;width:18px;height:18px;border:2px solid #ddd;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ad-loading{display:flex;align-items:center;gap:10px;padding:30px;color:#888;justify-content:center}
.ad-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}
.ad-modal-overlay.show{display:flex}
.ad-modal{background:#fff;border-radius:14px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;padding:28px}
.ad-modal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.ad-modal-h h3{margin:0;font-family:'Fraunces',serif;font-size:22px;font-weight:600}
.ad-close{background:none;border:none;font-size:22px;cursor:pointer;color:#888;line-height:1}
.ad-detail-grid{display:grid;grid-template-columns:140px 1fr;gap:12px 18px;font-size:13.5px;margin-bottom:20px}
.ad-detail-key{color:#888;font-weight:500;font-size:12.5px}
.ad-detail-val{color:#1a1a1a;line-height:1.6}
.ad-action-row{display:flex;gap:8px;flex-wrap:wrap;padding-top:16px;border-top:1px solid #eee;margin-top:10px}
.ad-photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-top:6px}
.ad-photo{width:100%;height:80px;background:#eee;border-radius:6px;background-size:cover;background-position:center}
.ad-textarea{width:100%;padding:10px;border:1px solid #d8d8d8;border-radius:6px;font-family:inherit;font-size:13px;resize:vertical;min-height:60px;margin:8px 0}
@media (max-width:1024px){.ad-stats{grid-template-columns:repeat(3,1fr)}}
@media (max-width:640px){.ad-stats{grid-template-columns:repeat(2,1fr)}.ad-detail-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="ad-shell">
  <div class="ad-topbar">
    <a href="admin.html" class="ad-logo">
      <div class="ad-logo-icon">TW</div>
      <div class="ad-logo-text">TravelWinners</div>
      <span class="ad-badge">ADMIN</span>
    </a>
    <div class="ad-nav-right">
      <span id="user-email">—</span>
      <button class="ad-logout" id="btn-logout">Sign out</button>
    </div>
  </div>

  <div class="ad-main">
    <h1 class="ad-h1">Admin Dashboard</h1>
    <p class="ad-h1-sub">Manage hotels, payments, and content production.</p>

    <div class="ad-stats" id="stats-area">
      <div class="ad-stat"><div class="ad-stat-lbl">Total Hotels</div><div class="ad-stat-val" id="st-total">—</div></div>
      <div class="ad-stat"><div class="ad-stat-lbl">Pending</div><div class="ad-stat-val" id="st-pending">—</div></div>
      <div class="ad-stat"><div class="ad-stat-lbl">Approved</div><div class="ad-stat-val" id="st-approved">—</div></div>
      <div class="ad-stat"><div class="ad-stat-lbl">Paid</div><div class="ad-stat-val" id="st-paid">—</div></div>
      <div class="ad-stat"><div class="ad-stat-lbl">Producing</div><div class="ad-stat-val" id="st-producing">—</div></div>
      <div class="ad-stat"><div class="ad-stat-lbl">Published</div><div class="ad-stat-val" id="st-published">—</div></div>
    </div>

    <div class="ad-card">
      <div class="ad-card-h">
        <h3>Hotel Partners</h3>
        <button class="ad-btn ad-btn-secondary" id="btn-refresh">↻ Refresh</button>
      </div>

      <div class="ad-filter-row" id="filter-row">
        <button class="ad-filter active" data-filter="all">All</button>
        <button class="ad-filter" data-filter="pending">Pending</button>
        <button class="ad-filter" data-filter="review">Review</button>
        <button class="ad-filter" data-filter="approved">Approved</button>
        <button class="ad-filter" data-filter="paid">Paid</button>
        <button class="ad-filter" data-filter="producing">Producing</button>
        <button class="ad-filter" data-filter="published">Published</button>
        <button class="ad-filter" data-filter="rejected">Rejected</button>
      </div>

      <div id="hotels-area">
        <div class="ad-loading"><div class="ad-loader"></div><span>Loading hotels...</span></div>
      </div>
    </div>
  </div>
</div>

<!-- Hotel Detail Modal -->
<div class="ad-modal-overlay" id="modal">
  <div class="ad-modal">
    <div class="ad-modal-h">
      <h3 id="modal-title">Hotel Details</h3>
      <button class="ad-close" id="modal-close">×</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
(function(){
  var T = window.TW;
  var $ = T.$;
  var allHotels = [];
  var currentFilter = 'all';

  T.requireAuth(function(user){
    $('user-email').textContent = user.email;
    if (!T.isAdmin(user)){
      window.location.href = 'dashboard.html';
      return;
    }
    loadAll();
  });

  $('btn-logout').addEventListener('click', T.logout);
  $('btn-refresh').addEventListener('click', loadAll);

  // Filter buttons
  document.querySelectorAll('.ad-filter').forEach(function(btn){
    btn.addEventListener('click', function(){
      document.querySelectorAll('.ad-filter').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.getAttribute('data-filter');
      renderHotels();
    });
  });

  $('modal-close').addEventListener('click', closeModal);
  $('modal').addEventListener('click', function(e){
    if (e.target === $('modal')) closeModal();
  });

  function loadAll(){
    $('hotels-area').innerHTML = '<div class="ad-loading"><div class="ad-loader"></div><span>Loading...</span></div>';
    T.db.getAllHotels().then(function(r){
      if (r.error){
        $('hotels-area').innerHTML = '<div class="ad-empty">Failed to load hotels: ' + (r.error.message || '') + '</div>';
        return;
      }
      allHotels = r.data || [];
      renderStats();
      renderHotels();
    });
  }

  function renderStats(){
    var counts = { total: allHotels.length, pending: 0, review: 0, approved: 0, paid: 0, producing: 0, published: 0 };
    allHotels.forEach(function(h){
      if (counts[h.status] !== undefined) counts[h.status]++;
    });
    $('st-total').textContent = counts.total;
    $('st-pending').textContent = counts.pending + counts.review;
    $('st-approved').textContent = counts.approved;
    $('st-paid').textContent = counts.paid;
    $('st-producing').textContent = counts.producing;
    $('st-published').textContent = counts.published;
  }

  function renderHotels(){
    var filtered = allHotels;
    if (currentFilter !== 'all'){
      filtered = allHotels.filter(function(h){ return h.status === currentFilter; });
    }

    if (filtered.length === 0){
      $('hotels-area').innerHTML = '<div class="ad-empty">No hotels in this category.</div>';
      return;
    }

    var html = '<div class="ad-table-wrap"><table class="ad-table">';
    html += '<thead><tr>';
    html += '<th>Hotel</th>';
    html += '<th>Manager</th>';
    html += '<th>Status</th>';
    html += '<th>Stars</th>';
    html += '<th>Rate</th>';
    html += '<th>Registered</th>';
    html += '<th>Actions</th>';
    html += '</tr></thead><tbody>';

    filtered.forEach(function(h){
      html += '<tr>';
      html += '<td><strong>' + esc(h.hotel_name || 'Unnamed') + '</strong>';
      if (h.address) html += '<br><span style="color:#888;font-size:11.5px">' + esc(h.address.substring(0, 50)) + (h.address.length > 50 ? '...' : '') + '</span>';
      html += '</td>';
      html += '<td>' + esc(h.manager_email || '-') + '<br><span style="color:#888;font-size:11.5px">' + esc(h.manager_name || '') + '</span></td>';
      html += '<td><span class="ad-status" style="background:' + T.fmt.statusColor(h.status) + '">' + T.fmt.statusLabel(h.status) + '</span></td>';
      html += '<td>' + (h.star_rating ? T.fmt.stars(h.star_rating) : '-') + '</td>';
      html += '<td>' + (h.daily_rate ? T.fmt.money(h.daily_rate, h.currency) : '-') + '</td>';
      html += '<td>' + T.fmt.date(h.created_at) + '</td>';
      html += '<td><button class="ad-btn ad-btn-primary" data-hotel-id="' + esc(h.id) + '">View</button></td>';
      html += '</tr>';
    });

    html += '</tbody></table></div>';
    $('hotels-area').innerHTML = html;

    document.querySelectorAll('[data-hotel-id]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = btn.getAttribute('data-hotel-id');
        openHotelModal(id);
      });
    });
  }

  function openHotelModal(hotelId){
    var h = allHotels.find(function(x){ return String(x.id) === String(hotelId); });
    if (!h) return;

    $('modal-title').textContent = h.hotel_name || 'Hotel Details';

    var rows = [];
    rows.push(dk('Status', '<span class="ad-status" style="background:' + T.fmt.statusColor(h.status) + '">' + T.fmt.statusLabel(h.status) + '</span>'));
    rows.push(dk('Manager Email', esc(h.manager_email || '-')));
    rows.push(dk('Manager Name', esc(h.manager_name || '-')));
    rows.push(dk('Manager Phone', esc(h.manager_phone || '-')));
    rows.push(dk('Hotel Name', esc(h.hotel_name || '-')));
    rows.push(dk('Stars', h.star_rating ? T.fmt.stars(h.star_rating) : '-'));
    rows.push(dk('Review', h.review_score ? (h.review_score + '/10 (' + (h.review_count || 0) + ' reviews)') : '-'));
    rows.push(dk('Daily Rate', h.daily_rate ? T.fmt.money(h.daily_rate, h.currency) : '-'));
    rows.push(dk('Address', esc(h.address || '-')));
    rows.push(dk('Phone', esc(h.phone || '-')));
    rows.push(dk('Website', h.website ? '<a href="' + esc(h.website) + '" target="_blank">' + esc(h.website) + '</a>' : '-'));
    rows.push(dk('Coordinates', (h.latitude && h.longitude) ? (h.latitude + ', ' + h.longitude) : '-'));
    rows.push(dk('Agoda URL', h.agoda_url ? '<a href="' + esc(h.agoda_url) + '" target="_blank">View on Agoda</a>' : '-'));
    rows.push(dk('Agoda Hotel ID', h.agoda_hotel_id || '-'));
    rows.push(dk('Google Place ID', h.google_place_id ? '<code style="font-size:11px">' + esc(h.google_place_id) + '</code>' : '-'));
    rows.push(dk('Registered', T.fmt.datetime(h.created_at)));

    var amenitiesArr = [];
    if (h.include_breakfast) amenitiesArr.push('🍳 Breakfast');
    if (h.free_wifi) amenitiesArr.push('📶 Free WiFi');
    rows.push(dk('Amenities', amenitiesArr.length ? amenitiesArr.join('  ·  ') : '-'));

    var photos = [];
    if (h.image_url) photos.push({url: h.image_url});
    if (h.google_photos_json){
      try {
        var gp = JSON.parse(h.google_photos_json);
        if (gp && gp.length) photos = photos.concat(gp);
      } catch (e) {}
    }
    if (photos.length){
      var photoHtml = '<div class="ad-photo-grid">';
      photos.slice(0, 6).forEach(function(p){
        photoHtml += '<div class="ad-photo" style="background-image:url(' + esc(p.url) + ')"></div>';
      });
      photoHtml += '</div>';
      rows.push(dk('Photos', photoHtml));
    }

    var actionsHtml = '<div class="ad-action-row">';
    var s = h.status;
    if (s === 'pending' || s === 'review'){
      actionsHtml += '<button class="ad-btn ad-btn-warning" data-action="review" data-id="' + esc(h.id) + '">Mark as Reviewing</button>';
      actionsHtml += '<button class="ad-btn ad-btn-success" data-action="approved" data-id="' + esc(h.id) + '">Approve</button>';
      actionsHtml += '<button class="ad-btn ad-btn-danger" data-action="rejected" data-id="' + esc(h.id) + '">Reject</button>';
    } else if (s === 'approved'){
      actionsHtml += '<button class="ad-btn ad-btn-success" data-action="paid" data-id="' + esc(h.id) + '">Mark as Paid</button>';
      actionsHtml += '<button class="ad-btn ad-btn-secondary" data-action="pending" data-id="' + esc(h.id) + '">Revert to Pending</button>';
    } else if (s === 'paid'){
      actionsHtml += '<button class="ad-btn ad-btn-primary" data-action="producing" data-id="' + esc(h.id) + '">Start Production</button>';
    } else if (s === 'producing'){
      actionsHtml += '<button class="ad-btn ad-btn-success" data-action="published" data-id="' + esc(h.id) + '">Mark as Published</button>';
    } else if (s === 'rejected'){
      actionsHtml += '<button class="ad-btn ad-btn-secondary" data-action="pending" data-id="' + esc(h.id) + '">Reopen</button>';
    }
    actionsHtml += '</div>';

    var bodyHtml = '<div class="ad-detail-grid">' + rows.join('') + '</div>' + actionsHtml;
    $('modal-body').innerHTML = bodyHtml;
    $('modal').classList.add('show');

    document.querySelectorAll('[data-action]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var action = btn.getAttribute('data-action');
        var id = btn.getAttribute('data-id');
        changeStatus(id, action);
      });
    });
  }

  function changeStatus(hotelId, newStatus){
    if (!confirm('Change status to: ' + newStatus + '?')) return;
    
    T.db.setHotelStatus(hotelId, newStatus).then(function(r){
      if (r.error){
        T.toast('Failed: ' + (r.error.message || ''), true);
        return;
      }
      T.toast('Status updated to ' + newStatus);
      closeModal();
      loadAll();
    });
  }

  function closeModal(){
    $('modal').classList.remove('show');
  }

  function dk(k, v){
    return '<div class="ad-detail-key">' + k + '</div><div class="ad-detail-val">' + v + '</div>';
  }

  function esc(s){
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

})();
</script>
</body>
</html>
