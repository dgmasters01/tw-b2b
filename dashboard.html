<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelWinners — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;background:var(--bg);font-family:var(--sans);color:var(--ink);min-height:100vh}
.dh-shell{max-width:1280px;margin:0 auto;padding:0 24px;position:relative;z-index:2}
.dh-topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid var(--line);background:rgba(10,10,15,.7);backdrop-filter:saturate(180%) blur(24px);margin:0 -24px;padding-left:24px;padding-right:24px;position:sticky;top:0;z-index:50}
.dh-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink)}
.dh-logo-icon{width:36px;height:36px;background:var(--aurora);color:#fff;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;letter-spacing:-.04em;box-shadow:var(--glow-p)}
.dh-logo-text{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:-.02em}
.dh-nav-right{display:flex;gap:16px;align-items:center}
.dh-lang{display:inline-flex;gap:2px;background:var(--glass);border:1px solid var(--line-2);border-radius:99px;padding:3px;backdrop-filter:blur(12px)}
.dh-lang button{background:transparent;border:none;padding:6px 14px;border-radius:17px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--ink-3);font-family:var(--sans);transition:var(--transition)}
.dh-lang button:hover{color:var(--ink-2)}
.dh-lang button.active{background:var(--aurora);color:#fff;font-weight:600;box-shadow:var(--glow-p)}
.dh-user{font-size:13.5px;color:var(--ink-3);font-family:var(--mono)}
.dh-logout{background:var(--glass);color:var(--ink-3);border:1px solid var(--line-2);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-family:var(--sans);backdrop-filter:blur(8px);transition:var(--transition);text-decoration:none;display:inline-block}
.dh-logout:hover{border-color:var(--line-3);color:var(--ink);background:var(--glass-2)}
.dh-main{padding:32px 0 60px}
.dh-section-title{font-family:var(--display);font-size:32px;font-weight:700;margin:0 0 6px;letter-spacing:-.025em;color:var(--ink)}
.dh-section-title em{font-style:normal;background:var(--aurora);-webkit-background-clip:text;background-clip:text;color:transparent}
.dh-section-sub{color:var(--ink-3);font-size:14px;margin:0 0 28px}
.dh-card{background:var(--glass);border:1px solid var(--line-2);border-radius:var(--r-lg);padding:28px;margin-bottom:18px;backdrop-filter:blur(24px) saturate(140%);box-shadow:var(--sh-2);position:relative;overflow:hidden}
.dh-status-badge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;color:#fff;background:var(--aurora);box-shadow:var(--glow-p)}
.dh-progress{display:flex;gap:8px;margin-top:20px;margin-bottom:8px}
.dh-progress-step{flex:1;text-align:center;font-size:11.5px;color:var(--ink-4);position:relative;font-family:var(--mono)}
.dh-progress-step::before{content:'';display:block;width:100%;height:4px;background:var(--line);margin-bottom:8px;border-radius:2px}
.dh-progress-step.done::before{background:var(--success);box-shadow:var(--glow-success)}
.dh-progress-step.active::before{background:var(--aurora)}
.dh-progress-step.done,.dh-progress-step.active{color:var(--ink);font-weight:600}
.dh-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.dh-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.dh-stat{background:var(--glass);border:1px solid var(--line-2);border-radius:var(--r);padding:20px;backdrop-filter:blur(12px);position:relative;overflow:hidden;transition:var(--transition)}
.dh-stat:hover{border-color:var(--line-3);transform:translateY(-2px)}
.dh-stat-label{font-size:11.5px;color:var(--ink-4);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;font-family:var(--mono)}
.dh-stat-value{font-size:28px;font-weight:700;color:var(--ink);font-family:var(--mono);letter-spacing:-.02em}
.dh-stat-trend{font-size:12px;color:var(--success);margin-top:4px;font-weight:600}
.dh-hotel-info{display:flex;gap:20px;align-items:flex-start}
.dh-hotel-img{width:140px;height:100px;border-radius:10px;background:var(--bg-3);background-size:cover;background-position:center;flex-shrink:0;border:1px solid var(--line-2)}
.dh-hotel-meta h2{font-family:var(--display);font-size:22px;margin:0 0 4px;font-weight:700;color:var(--ink);letter-spacing:-.02em}
.dh-hotel-meta-row{font-size:13px;color:var(--ink-3);margin-bottom:4px}
.dh-pay-card{background:linear-gradient(135deg,rgba(124,58,237,.18) 0%,rgba(236,72,153,.12) 50%,rgba(6,182,212,.18) 100%);color:var(--ink);border:1px solid var(--line-2);border-radius:var(--r-lg);padding:32px;margin-bottom:18px;backdrop-filter:blur(24px) saturate(140%);box-shadow:var(--sh-3),var(--glow-p);position:relative;overflow:hidden}
.dh-pay-card::before{content:'';position:absolute;top:-50%;right:-30%;width:300px;height:300px;background:conic-gradient(from 180deg,#7C3AED,#EC4899,#F59E0B,#06B6D4,#7C3AED);border-radius:50%;filter:blur(80px);opacity:.3;pointer-events:none}
.dh-pay-card>*{position:relative;z-index:1}
.dh-pay-card h3{font-family:var(--display);font-size:24px;margin:0 0 8px;font-weight:700;letter-spacing:-.02em}
.dh-pay-card p{margin:0 0 20px;color:var(--ink-2);font-size:14.5px;line-height:1.6}
.dh-pay-amount{font-size:48px;font-weight:700;margin-bottom:8px;font-family:var(--mono);background:var(--aurora);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-.02em}
.dh-pay-btn{background:var(--aurora);color:#fff;border:none;padding:14px 32px;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--sans);box-shadow:var(--glow-p),0 1px 0 rgba(255,255,255,.2) inset;transition:var(--transition);letter-spacing:-.005em}
.dh-pay-btn:hover{transform:translateY(-1px);box-shadow:var(--glow-p),var(--glow-m),0 1px 0 rgba(255,255,255,.2) inset}
.dh-pay-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.dh-pay-meta{display:flex;gap:16px;font-size:12.5px;color:var(--ink-3);margin-top:14px;flex-wrap:wrap;font-family:var(--mono)}
.dh-empty{text-align:center;padding:60px 20px;color:var(--ink-3)}
.dh-empty-icon{font-size:48px;margin-bottom:12px;opacity:.6}
.dh-empty h3{font-size:18px;margin:0 0 8px;color:var(--ink);font-family:var(--display);letter-spacing:-.02em}
.dh-btn{padding:12px 24px;border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--sans);text-decoration:none;display:inline-block;transition:var(--transition)}
.dh-btn-primary{background:var(--aurora);color:#fff;box-shadow:var(--glow-p),0 1px 0 rgba(255,255,255,.2) inset}
.dh-btn-primary:hover{transform:translateY(-1px);box-shadow:var(--glow-p),var(--glow-m),0 1px 0 rgba(255,255,255,.2) inset}
.dh-loader{display:inline-block;width:20px;height:20px;border:2px solid var(--line-2);border-top-color:var(--aurora-1);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dh-loading{display:flex;flex-direction:column;align-items:center;padding:60px;gap:14px;color:var(--ink-3);font-size:13px}
.dh-table{width:100%;border-collapse:collapse;font-size:13.5px}
.dh-table th{text-align:left;padding:12px;background:var(--bg-2);color:var(--ink-3);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.06em;font-family:var(--mono);border-bottom:1px solid var(--line-2)}
.dh-table td{padding:14px 12px;border-bottom:1px solid var(--line);color:var(--ink-2)}
.dh-table tr:last-child td{border-bottom:none}
.dh-table tr:hover td{background:var(--glass)}
.dh-tabs{display:flex;gap:0;border-bottom:1px solid var(--line);margin-bottom:20px}
.dh-tab{padding:12px 18px;cursor:pointer;font-size:13.5px;color:var(--ink-3);border-bottom:2px solid transparent;font-weight:500;transition:var(--transition)}
.dh-tab:hover{color:var(--ink-2)}
.dh-tab.active{color:var(--ink);border-color:var(--aurora-1);font-weight:600}
.dh-h3{font-size:16px;font-weight:700;margin:0 0 14px;color:var(--ink);letter-spacing:-.015em}
@media (max-width:720px){.dh-grid-2,.dh-grid-3{grid-template-columns:1fr}.dh-hotel-info{flex-direction:column}.dh-hotel-img{width:100%;height:160px}}
</style>
</head>
<body>
<!-- Aurora background (v2) -->
<div class="aurora-bg">
  <div class="aurora-blob b1"></div>
  <div class="aurora-blob b2"></div>
  <div class="aurora-blob b3"></div>
  <div class="aurora-blob b4"></div>
</div>
<div class="aurora-grid"></div>

<div class="dh-shell">
  <!-- BL-COMMON-HEADER-UNIFY: 기존 dh-topbar 헤더 → 공통 헤더 컨테이너로 교체 -->
  <header id="tw-common-header"></header>

  <div class="dh-main" id="dh-main">
    <div class="dh-loading"><div class="dh-loader"></div><div data-en="Loading dashboard..." data-ko="대시보드 불러오는 중...">Loading dashboard...</div></div>
  </div>
</div>

<script>
(function(){
  var T = window.TW;
  var $ = T.$;
  var currentUser = null;
  var myHotel = null;

  // ────────────────────────────────────────────────────────────────
  // BL-MANAGER-IMPERSONATE: ?impersonate=MANAGER_ID&hotel=HOTEL_ID
  // 관리자가 매니저 행세로 매니저 본인 화면 그대로 보기.
  // admin 권한 검증 후에만 동작. 일반 사용자는 무시.
  // ────────────────────────────────────────────────────────────────
  var imp = (function(){
    var p = new URLSearchParams(location.search);
    var managerId = p.get('impersonate');
    var hotelId = p.get('hotel');
    if (!managerId) return null;
    return { managerId: managerId, hotelId: hotelId };
  })();

  T.requireAuth(async function(user){
    currentUser = user;
    // BL-COMMON-HEADER-UNIFY: 공통 헤더 렌더 (Sign out 핸들러는 함수가 직접 바인딩)
    if (typeof T.renderCommonHeader === 'function') {
      T.renderCommonHeader({ activeTab: 'dashboard' });
    }
    var ue = $('user-email');
    if (ue) ue.textContent = user.email;

    var ac = await T.checkAdmin(user);

    // 임포저네이트 모드 — admin만 가능, admin.html 리다이렉트 우회
    if (imp) {
      if (!ac.is_admin) {
        // 비관리자가 임포저네이트 시도 → 무시하고 일반 흐름
        imp = null;
      } else {
        renderImpersonateBanner(imp);
        loadImpersonatedHotel(imp);
        return;
      }
    }

    if (ac.is_admin) {
      // 관리자는 admin.html로
      window.location.href = 'admin.html';
      return;
    }

    // ────────────────────────────────────────────────────────────────
    // BL-USER-STAGE-GATING (D-044): 결제 단계별 강력 차단 게이트
    // - 호텔 0건         → hotel-info.html (호텔 등록 유도)
    // - 호텔 있음·미결제  → sales.html      (결제 유도)
    // - 결제 완료(paid+) → dashboard 정상 노출
    // dashboard 화면 0.1초도 노출 금지 → 호텔 fetch 직후 즉시 redirect.
    // 결제 완료 그룹: paid / producing / published
    // 결제 전 그룹:   pending / review / approved / rejected
    //
    // [BL-FLOW-1-AGODA-AUTO-APPROVE 2026-05-23 연계]
    // hotel-info.html에서 Agoda 매칭 성공 시 status='approved' 자동 박힘 →
    // 이 라우팅이 approved를 sales.html로 즉시 보내서 매니저는 결제 페이지로 직행.
    // 매니저 열정 식기 전 결제 누름 = 매출 즉시 회복.
    // ────────────────────────────────────────────────────────────────
    stageGateRedirect();
  });

  function stageGateRedirect(){
    T.db.getMyHotels({ noCache: true }).then(function(r){
      if (r.error){
        // fetch 실패 — 안전하게 hotel-info로 (미등록 가정)
        // 실패 시 dashboard에 잠깐이라도 머무르면 노출 위반
        window.location.replace('hotel-info.html');
        return;
      }
      var hotels = r.data || [];

      // ① 호텔 0건 → hotel-info.html (등록 페이지로 즉시 이동)
      if (hotels.length === 0){
        window.location.replace('hotel-info.html');
        return;
      }

      // ② 결제 전 그룹 → sales.html (결제 유도 페이지로 즉시 이동)
      var status = (hotels[0].status || 'pending');
      var PAID_GROUP = ['paid', 'producing', 'published'];
      if (PAID_GROUP.indexOf(status) === -1){
        window.location.replace('sales.html');
        return;
      }

      // ③ 결제 완료 → dashboard 정상 렌더 (myHotel 재사용 — 중복 fetch 방지)
      myHotel = hotels[0];
      renderDashboard();
    }).catch(function(err){
      console.error('[stageGateRedirect]', err);
      window.location.replace('hotel-info.html');
    });
  }

  function renderImpersonateBanner(imp) {
    // 페이지 상단에 임포저네이트 모드 알림 박기
    var banner = document.createElement('div');
    banner.id = 'dh-impersonate-banner';
    banner.style.cssText = 'position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#7C3AED,#EC4899);color:#fff;padding:10px 20px;font-size:13px;display:flex;align-items:center;justify-content:space-between;gap:12px;font-family:-apple-system,sans-serif;';
    banner.innerHTML =
      '<div style="display:flex;align-items:center;gap:10px;">' +
        '<span style="font-size:16px;">🔍</span>' +
        '<span><strong>임포저네이트 모드</strong> — 매니저가 보는 화면을 그대로 보고 있습니다 (관리자 전용)</span>' +
      '</div>' +
      '<a href="/admin-manager-hub.html?id=' + encodeURIComponent(imp.managerId) + '" ' +
        'style="background:rgba(255,255,255,.2);color:#fff;padding:5px 12px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:600;">' +
        '← 허브로 돌아가기' +
      '</a>';
    document.body.insertBefore(banner, document.body.firstChild);
  }

  function loadImpersonatedHotel(imp) {
    // hotel_id로 직접 호텔 fetch (admin이라 RLS 통과)
    if (!imp.hotelId) {
      // hotel_id 없으면 manager_id로 hotels.user_id=managerId 조회
      T.sb.from('hotels')
        .select('*')
        .eq('user_id', imp.managerId)
        .limit(1)
        .maybeSingle()
        .then(function(r){
          if (r.error || !r.data) {
            $('dh-main').innerHTML = '<div class="dh-card"><div class="dh-empty">이 매니저의 호텔이 없습니다.</div></div>';
            return;
          }
          myHotel = r.data;
          renderDashboard();
        });
      return;
    }
    T.sb.from('hotels')
      .select('*')
      .eq('id', imp.hotelId)
      .limit(1)
      .maybeSingle()
      .then(function(r){
        if (r.error || !r.data) {
          $('dh-main').innerHTML = '<div class="dh-card"><div class="dh-empty">호텔 정보 로드 실패</div></div>';
          return;
        }
        myHotel = r.data;
        renderDashboard();
      });
  }

  // BL-COMMON-HEADER-UNIFY: 기존 btn-logout 안전 참조 (공통 헤더가 #tw-signout-btn에 핸들러 박음. 이건 fallback)
  var legacyLogoutBtn = $('btn-logout');
  if (legacyLogoutBtn) legacyLogoutBtn.addEventListener('click', T.logout);

  // [Phase 3 Step 5] Auto-reload dashboard when:
  //   1) tab regains visibility (e.g. user came back from hotel-info edit)
  //   2) cache was invalidated (same tab via TW.db.* OR cross-tab via BroadcastChannel/storage)
  //   3) localStorage 'tw-hotels-dirty' flag (legacy fallback)
  document.addEventListener('visibilitychange', function(){
    if (!document.hidden && currentUser && !imp) {
      loadDashboard({ noCache: true });
    } else if (!document.hidden && currentUser && imp) {
      loadImpersonatedHotel(imp);
    }
  });
  window.addEventListener('tw:cache:invalidate', function(ev){
    var k = ev && ev.detail && ev.detail.key;
    if ((k === 'hotels' || k === 'myHotels') && currentUser && !imp) loadDashboard({ noCache: true });
  });
  window.addEventListener('storage', function(ev){
    if (ev.key === 'tw-hotels-dirty' && currentUser && !imp) loadDashboard({ noCache: true });
  });

  function loadDashboard(opts){
    T.db.getMyHotels(opts || {}).then(function(r){
      var main = $('dh-main');
      
      if (r.error){
        main.innerHTML = '<div class="dh-card"><div class="dh-empty">' + (T.lang === 'ko' ? '데이터 불러오기 실패' : 'Failed to load data') + '</div></div>';
        return;
      }

      var hotels = r.data || [];

      // BL-USER-STAGE-GATING (D-044): 재로드 시에도 게이트 재검사
      // 결제 취소·환불·status 변경 등으로 paid 그룹 이탈 시 즉시 redirect
      if (hotels.length === 0){
        window.location.replace('hotel-info.html');
        return;
      }
      var _status = (hotels[0].status || 'pending');
      var _PAID = ['paid', 'producing', 'published'];
      if (_PAID.indexOf(_status) === -1){
        window.location.replace('sales.html');
        return;
      }

      myHotel = hotels[0];
      renderDashboard();
    }).catch(function(err){
      console.error(err);
      $('dh-main').innerHTML = '<div class="dh-card"><div class="dh-empty">' + (T.lang === 'ko' ? '오류 발생' : 'Error occurred') + '</div></div>';
    });
  }

  function renderNoHotel(){
    var html = '<h1 class="dh-section-title" data-en="Welcome to <em>TravelWinners!</em>" data-ko="<em>TravelWinners</em>에 오신 걸 환영합니다!">Welcome to <em>TravelWinners!</em></h1>';
    html += '<p class="dh-section-sub" data-en="Get started by registering your hotel." data-ko="호텔을 등록하고 시작하세요.">Get started by registering your hotel.</p>';
    html += '<div class="dh-card"><div class="dh-empty">';
    html += '<div class="dh-empty-icon">🏨</div>';
    html += '<h3 data-en="No hotel registered yet" data-ko="아직 등록된 호텔이 없습니다">No hotel registered yet</h3>';
    html += '<p style="margin-bottom:24px" data-en="Paste your Agoda URL and we\'ll auto-fill your hotel info." data-ko="아고다 URL을 붙여넣으면 호텔 정보를 자동으로 가져옵니다.">Paste your Agoda URL and we\'ll auto-fill your hotel info.</p>';
    html += '<a href="hotel-info.html" class="dh-btn dh-btn-primary" data-en="Register Hotel →" data-ko="호텔 등록하기 →">Register Hotel →</a>';
    html += '</div></div>';
    $('dh-main').innerHTML = html;
    T.switchLang(T.lang);
  }

  function renderDashboard(){
    var h = myHotel;
    var status = h.status || 'pending';
    var lang = T.lang;

    var html = '';
    
    // === 헤더 ===
    html += '<h1 class="dh-section-title">' + (lang === 'ko' ? '<em>대시보드</em>' : '<em>Dashboard</em>') + '</h1>';
    html += '<p class="dh-section-sub">' + (lang === 'ko' ? '호텔 정보, 결제 상태, 영상 진행상황을 한눈에 확인하세요.' : 'Track your hotel info, payment status, and video progress.') + '</p>';

    // === 호텔 카드 ===
    html += '<div class="dh-card">';
    html += '<div class="dh-hotel-info">';
    var imgUrl = h.image_url || '';
    if (h.google_photos){
      try {
        var photos = (typeof h.google_photos === 'string') ? JSON.parse(h.google_photos) : h.google_photos;
        if (photos && photos.length && photos[0].url) imgUrl = photos[0].url;
      } catch (e) {}
    }
    html += '<div class="dh-hotel-img" style="background-image:url(' + esc(imgUrl) + ')"></div>';
    html += '<div class="dh-hotel-meta" style="flex:1">';
    html += '<h2>' + esc(h.hotel_name || 'Unnamed Hotel') + '</h2>';
    if (h.star_rating){
      html += '<div class="dh-hotel-meta-row">' + T.fmt.stars(h.star_rating);
      if (h.review_score) html += '  ·  ' + h.review_score + '/10 (' + (h.review_count || 0) + ' reviews)';
      html += '</div>';
    }
    if (h.address) html += '<div class="dh-hotel-meta-row">📍 ' + esc(h.address) + '</div>';
    if (h.phone) html += '<div class="dh-hotel-meta-row">📞 ' + esc(h.phone) + '</div>';
    if (h.website) html += '<div class="dh-hotel-meta-row">🌐 <a href="' + esc(h.website) + '" target="_blank" rel="noopener">' + esc(h.website) + '</a></div>';
    html += '<div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="dh-status-badge" style="background:' + T.fmt.statusColor(status) + '">' + T.fmt.statusLabel(status, lang) + '</span>';
    html += '<a href="hotel-info.html?edit=1" class="dh-btn dh-btn-secondary" style="padding:6px 14px;font-size:13px" data-en="Edit Hotel Info" data-ko="호텔 정보 수정">Edit Hotel Info</a>';
    html += '</div>';
    html += '</div></div>';

    // === 진행 상태 ===
    html += '<div class="dh-progress">';
    var steps = lang === 'ko' 
      ? ['등록', '검토', '승인', '결제', '제작', '게시']
      : ['Register', 'Review', 'Approve', 'Pay', 'Produce', 'Publish'];
    var stepStatus = ['pending','review','approved','paid','producing','published'];
    var statusOrder = stepStatus.indexOf(status);
    if (statusOrder === -1) statusOrder = 0;
    
    for (var i = 0; i < steps.length; i++){
      var cls = 'dh-progress-step';
      if (i < statusOrder) cls += ' done';
      else if (i === statusOrder) cls += ' active';
      html += '<div class="' + cls + '">' + steps[i] + '</div>';
    }
    html += '</div>';
    html += '</div>';

    // === 상태별 분기 ===
    if (status === 'pending' || status === 'review'){
      // 대기/검토 중
      html += '<div class="dh-card">';
      html += '<div class="dh-empty">';
      html += '<div class="dh-empty-icon">⏳</div>';
      html += '<h3>' + (lang === 'ko' ? '검토 진행 중' : 'Under Review') + '</h3>';
      html += '<p>' + (lang === 'ko' ? '제출하신 호텔 정보를 검토 중입니다. 보통 1-2 영업일 내 승인됩니다.' : 'We\'re reviewing your hotel info. Approval typically takes 1-2 business days.') + '</p>';
      html += '</div></div>';
    } else if (status === 'approved'){
      // 승인 → 결제 유도
      html += '<div class="dh-pay-card">';
      html += '<h3>' + (lang === 'ko' ? '🎉 호텔이 승인되었습니다!' : '🎉 Your hotel is approved!') + '</h3>';
      html += '<p>' + (lang === 'ko' ? '$200 영상 제작 비용을 결제하시면 6개 언어 유튜브 채널에 호텔 영상이 게시됩니다.' : 'Complete the $200 video production payment to publish your hotel video across 6-language YouTube channels.') + '</p>';
      html += '<div class="dh-pay-amount">$200 USD</div>';
      // PayPal Buttons 컨테이너 (SDK 로드 후 paypal.Buttons() 가 렌더링)
      html += '<div id="paypal-button-container" style="background:#fff;border-radius:10px;padding:16px;min-height:55px;max-width:420px;box-shadow:0 4px 16px rgba(0,0,0,.4)"></div>';
      html += '<div id="paypal-status-note" style="margin-top:10px;font-size:12.5px;opacity:.85;min-height:18px"></div>';
      html += '<div class="dh-pay-meta">';
      html += '<span>✓ ' + (lang === 'ko' ? '안전한 PayPal 결제' : 'Secure PayPal payment') + '</span>';
      html += '<span>✓ ' + (lang === 'ko' ? '7일 이내 영상 제작 완료' : 'Video ready in 7 days') + '</span>';
      html += '<span>✓ ' + (lang === 'ko' ? '6개 언어 채널 게시' : '6-language channels') + '</span>';
      html += '</div>';
      html += '</div>';
    } else if (status === 'paid' || status === 'producing'){
      // 결제 완료 → 제작 중
      html += '<div class="dh-card">';
      html += '<h3 class="dh-h3">' + (lang === 'ko' ? '✅ 결제 완료 — 영상 제작 중' : '✅ Payment Received — Video in Production') + '</h3>';
      html += '<p style="color:var(--ink-2);line-height:1.7">' + (lang === 'ko' ? '결제가 완료되었습니다. 저희 팀이 호텔 영상을 제작 중입니다. 7일 이내 게시 예정입니다.' : 'Payment received. Our team is producing your hotel video. It will be published within 7 days.') + '</p>';
      html += '</div>';
    } else if (status === 'published'){
      // 게시됨 → 통계 표시
      html += '<div class="dh-grid-3">';
      html += '<div class="dh-stat"><div class="dh-stat-label">' + (lang === 'ko' ? '총 조회수' : 'Total Views') + '</div><div class="dh-stat-value">—</div><div class="dh-stat-trend">' + (lang === 'ko' ? '집계 중' : 'Calculating') + '</div></div>';
      html += '<div class="dh-stat"><div class="dh-stat-label">' + (lang === 'ko' ? '예약 수' : 'Bookings') + '</div><div class="dh-stat-value">—</div><div class="dh-stat-trend">' + (lang === 'ko' ? '집계 중' : 'Calculating') + '</div></div>';
      html += '<div class="dh-stat"><div class="dh-stat-label">' + (lang === 'ko' ? '커미션' : 'Commission') + '</div><div class="dh-stat-value">—</div><div class="dh-stat-trend">' + (lang === 'ko' ? '집계 중' : 'Calculating') + '</div></div>';
      html += '</div>';
    } else if (status === 'rejected'){
      html += '<div class="dh-card"><div class="dh-empty">';
      html += '<div class="dh-empty-icon">❌</div>';
      html += '<h3>' + (lang === 'ko' ? '거절되었습니다' : 'Application Rejected') + '</h3>';
      html += '<p>' + (lang === 'ko' ? '문의: dgmasters01@gmail.com' : 'Contact: dgmasters01@gmail.com') + '</p>';
      html += '</div></div>';
    }

    // === 결제 내역 ===
    html += '<div class="dh-card">';
    html += '<h3 class="dh-h3">' + (lang === 'ko' ? '결제 내역' : 'Payment History') + '</h3>';
    html += '<div id="payments-area"><div class="dh-loader"></div></div>';
    html += '</div>';

    $('dh-main').innerHTML = html;
    T.switchLang(lang);

    // 결제 버튼: 'approved' 상태일 때만 PayPal Buttons 렌더링
    if (status === 'approved'){
      initPayPalButtons();
    }

    // 결제 내역 로드
    loadPayments();
  }

  // ==========================================================
  // PayPal 결제 통합
  // ==========================================================
  var _paypalSdkLoaded = false;
  var _paypalConfig = null;

  /**
   * PayPal SDK 동적 로드 + Buttons 렌더링
   * 1) /api/paypal?action=config 호출 → client_id, env 획득
   * 2) https://www.paypal.com/sdk/js?client-id=... 스크립트 로드
   * 3) paypal.Buttons({...}).render('#paypal-button-container')
   */
  function initPayPalButtons(){
    var container = document.getElementById('paypal-button-container');
    var note = document.getElementById('paypal-status-note');
    if (!container) return;

    setStatusNote(T.lang === 'ko' ? '결제 시스템 로딩 중...' : 'Loading payment system...', '');

    fetch('/api/paypal?action=config')
      .then(function(r){ return r.json(); })
      .then(function(cfg){
        if (!cfg.clientId){
          setStatusNote(T.lang === 'ko' ? '결제 시스템 설정 오류' : 'Payment system not configured', 'error');
          return;
        }
        _paypalConfig = cfg;
        return loadPayPalSdk(cfg.clientId);
      })
      .then(function(){
        if (!_paypalSdkLoaded || !window.paypal) return;
        renderPayPalButtons();
      })
      .catch(function(err){
        console.error('PayPal init failed:', err);
        setStatusNote(T.lang === 'ko' ? '결제 시스템 로딩 실패. 잠시 후 다시 시도하세요.' : 'Failed to load payment system. Try again later.', 'error');
      });
  }

  function loadPayPalSdk(clientId){
    return new Promise(function(resolve, reject){
      if (window.paypal){ _paypalSdkLoaded = true; resolve(); return; }
      var script = document.createElement('script');
      // [Phase 3 Step C hotfix] disable-funding 제거 — Korea sandbox/일부 계정에서 funding source 부재로 즉시 닫히는 이슈 회피
      var qs = 'client-id=' + encodeURIComponent(clientId) + '&currency=USD&intent=capture';
      script.src = 'https://www.paypal.com/sdk/js?' + qs;
      script.async = true;
      script.onload = function(){ _paypalSdkLoaded = true; resolve(); };
      script.onerror = function(){ reject(new Error('PayPal SDK load failed')); };
      document.head.appendChild(script);
    });
  }

  function renderPayPalButtons(){
    if (!window.paypal || !window.paypal.Buttons){
      setStatusNote(T.lang === 'ko' ? 'PayPal SDK 로딩 실패' : 'PayPal SDK failed', 'error');
      return;
    }
    var container = document.getElementById('paypal-button-container');
    if (!container) return;
    container.innerHTML = ''; // 중복 렌더링 방지

    window.paypal.Buttons({
      style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal', height: 45 },

      // 1. 서버에 Order 생성 요청
      createOrder: function(){
        setStatusNote(T.lang === 'ko' ? '결제 준비 중...' : 'Preparing payment...', '');
        return getAuthHeader().then(function(authHdr){
          return fetch('/api/paypal?action=create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': authHdr },
            body: JSON.stringify({ hotel_id: myHotel.id }),
          });
        }).then(function(r){ return r.json().then(function(d){ return { ok: r.ok, status: r.status, data: d }; }); })
          .then(function(res){
            if (!res.ok){
              var msg = (res.data && (res.data.reason || res.data.error)) || 'create_order_failed';
              setStatusNote((T.lang === 'ko' ? '결제 생성 실패: ' : 'Order creation failed: ') + msg, 'error');
              throw new Error(msg);
            }
            setStatusNote('', '');
            return res.data.order_id;
          });
      },

      // 2. 사용자가 PayPal 창에서 승인 완료 → 서버에 capture 요청
      onApprove: function(data){
        setStatusNote(T.lang === 'ko' ? '결제 처리 중...' : 'Processing payment...', '');
        return getAuthHeader().then(function(authHdr){
          return fetch('/api/paypal?action=capture-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': authHdr },
            body: JSON.stringify({ order_id: data.orderID, hotel_id: myHotel.id }),
          });
        }).then(function(r){ return r.json().then(function(d){ return { ok: r.ok, status: r.status, data: d }; }); })
          .then(function(res){
            if (!res.ok || !res.data || !res.data.ok){
              var detail = (res.data && (res.data.detail || res.data.error)) || 'capture_failed';
              setStatusNote((T.lang === 'ko' ? '결제 확정 실패: ' : 'Payment capture failed: ') + detail, 'error');
              return;
            }
            setStatusNote(T.lang === 'ko' ? '✅ 결제가 완료되었습니다! 대시보드를 새로고침합니다...' : '✅ Payment complete! Refreshing dashboard...', 'success');
            T.toast(T.lang === 'ko' ? '결제 완료!' : 'Payment complete!');
            // hotels.status는 트리거가 'paid'로 자동 전환 → 대시보드 다시 로드
            setTimeout(function(){
              if (T.cache && T.cache.invalidate){
                T.cache.invalidate('hotels');
                T.cache.invalidate('myHotels');
              }
              loadDashboard({ noCache: true });
            }, 1500);
          });
      },

      onCancel: function(){
        setStatusNote(T.lang === 'ko' ? '결제가 취소되었습니다.' : 'Payment cancelled.', '');
      },

      onError: function(err){
        console.error('PayPal Buttons error:', err);
        setStatusNote(T.lang === 'ko' ? '결제 중 오류가 발생했습니다. 다시 시도해주세요.' : 'Payment error occurred. Please try again.', 'error');
      },
    }).render('#paypal-button-container').catch(function(e){
      console.error('PayPal render failed:', e);
      setStatusNote(T.lang === 'ko' ? 'PayPal 버튼 표시 실패' : 'Failed to render PayPal buttons', 'error');
    });
  }

  function getAuthHeader(){
    if (T.sb && T.sb.auth && T.sb.auth.getSession){
      return T.sb.auth.getSession().then(function(r){
        var token = r && r.data && r.data.session && r.data.session.access_token;
        return 'Bearer ' + (token || '');
      });
    }
    return Promise.resolve('');
  }

  function setStatusNote(text, kind){
    var n = document.getElementById('paypal-status-note');
    if (!n) return;
    n.textContent = text || '';
    if (kind === 'error') n.style.color = '#ffd2d2';
    else if (kind === 'success') n.style.color = '#c8ffd2';
    else n.style.color = '';
  }
  // ==========================================================

  function loadPayments(){
    T.db.getPayments(myHotel.id).then(function(r){
      var area = document.getElementById('payments-area');
      if (!area) return;
      
      var payments = r.data || [];
      if (payments.length === 0){
        area.innerHTML = '<div style="color:var(--ink-3);font-size:13px;padding:8px 0">' + (T.lang === 'ko' ? '결제 내역이 없습니다.' : 'No payments yet.') + '</div>';
        return;
      }

      var html = '<table class="dh-table">';
      html += '<thead><tr>';
      html += '<th>' + (T.lang === 'ko' ? '날짜' : 'Date') + '</th>';
      html += '<th>' + (T.lang === 'ko' ? '금액' : 'Amount') + '</th>';
      html += '<th>' + (T.lang === 'ko' ? '방법' : 'Method') + '</th>';
      html += '<th>' + (T.lang === 'ko' ? '상태' : 'Status') + '</th>';
      html += '</tr></thead><tbody>';
      payments.forEach(function(p){
        html += '<tr>';
        html += '<td>' + T.fmt.date(p.created_at) + '</td>';
        html += '<td>' + T.fmt.money(p.amount, p.currency || 'USD') + '</td>';
        html += '<td>' + esc(p.method || '-') + '</td>';
        html += '<td>' + esc(p.status || '-') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      area.innerHTML = html;
    });
  }

  function esc(s){
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

})();
</script>
