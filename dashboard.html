<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelWinners — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
*{box-sizing:border-box}
body{margin:0;background:#f7f7f7;font-family:'DM Sans','Noto Sans KR',sans-serif;color:#1a1a1a;min-height:100vh}
.dh-shell{max-width:1280px;margin:0 auto;padding:0 24px}
.dh-topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 0;border-bottom:1px solid #e8e8e8;background:#fff;margin:0 -24px;padding-left:24px;padding-right:24px}
.dh-logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#1a1a1a}
.dh-logo-icon{width:36px;height:36px;background:#534AB7;color:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700}
.dh-logo-text{font-family:'Fraunces',serif;font-size:20px;font-weight:600}
.dh-nav-right{display:flex;gap:16px;align-items:center}
.dh-lang{display:flex;gap:6px}
.dh-lang button{background:#fff;border:1px solid #e0e0e0;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:12.5px;font-weight:500}
.dh-lang button.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.dh-user{font-size:13.5px;color:#666}
.dh-logout{background:none;border:1px solid #d8d8d8;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-family:inherit}
.dh-logout:hover{background:#f5f5f5}
.dh-main{padding:32px 0 60px}
.dh-section-title{font-family:'Fraunces',serif;font-size:30px;font-weight:600;margin:0 0 6px}
.dh-section-sub{color:#777;font-size:14px;margin:0 0 28px}
.dh-card{background:#fff;border:1px solid #e8e8e8;border-radius:14px;padding:28px;margin-bottom:18px}
.dh-status-badge{display:inline-block;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:600;color:#fff}
.dh-progress{display:flex;gap:8px;margin-top:20px;margin-bottom:8px}
.dh-progress-step{flex:1;text-align:center;font-size:11.5px;color:#999;position:relative}
.dh-progress-step::before{content:'';display:block;width:100%;height:4px;background:#eee;margin-bottom:8px;border-radius:2px}
.dh-progress-step.done::before{background:#0a7c3a}
.dh-progress-step.active::before{background:#534AB7}
.dh-progress-step.done,.dh-progress-step.active{color:#1a1a1a;font-weight:600}
.dh-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.dh-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.dh-stat{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:20px}
.dh-stat-label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.dh-stat-value{font-size:28px;font-weight:700;color:#1a1a1a}
.dh-stat-trend{font-size:12px;color:#0a7c3a;margin-top:4px}
.dh-hotel-info{display:flex;gap:20px;align-items:flex-start}
.dh-hotel-img{width:140px;height:100px;border-radius:8px;background:#eee;background-size:cover;background-position:center;flex-shrink:0}
.dh-hotel-meta h2{font-family:'Fraunces',serif;font-size:22px;margin:0 0 4px;font-weight:600}
.dh-hotel-meta-row{font-size:13px;color:#666;margin-bottom:4px}
.dh-pay-card{background:linear-gradient(135deg,#534AB7 0%,#3d3690 100%);color:#fff;border-radius:14px;padding:32px;margin-bottom:18px}
.dh-pay-card h3{font-family:'Fraunces',serif;font-size:24px;margin:0 0 8px;font-weight:600}
.dh-pay-card p{margin:0 0 20px;opacity:.9;font-size:14.5px;line-height:1.6}
.dh-pay-amount{font-size:42px;font-weight:700;margin-bottom:8px}
.dh-pay-btn{background:#fff;color:#534AB7;border:none;padding:14px 32px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit}
.dh-pay-btn:hover{background:#f0f0ff}
.dh-pay-btn:disabled{opacity:.7;cursor:not-allowed}
.dh-pay-meta{display:flex;gap:16px;font-size:12.5px;opacity:.85;margin-top:14px;flex-wrap:wrap}
.dh-empty{text-align:center;padding:60px 20px;color:#888}
.dh-empty-icon{font-size:48px;margin-bottom:12px}
.dh-empty h3{font-size:18px;margin:0 0 8px;color:#1a1a1a}
.dh-btn{padding:12px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit;text-decoration:none;display:inline-block}
.dh-btn-primary{background:#1a1a1a;color:#fff}
.dh-btn-primary:hover{background:#000}
.dh-loader{display:inline-block;width:20px;height:20px;border:2px solid #ddd;border-top-color:#534AB7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.dh-loading{display:flex;flex-direction:column;align-items:center;padding:60px;gap:14px;color:#888;font-size:13px}
.dh-table{width:100%;border-collapse:collapse;font-size:13.5px}
.dh-table th{text-align:left;padding:10px 12px;background:#f7f7f7;color:#888;font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.3px}
.dh-table td{padding:12px;border-bottom:1px solid #f0f0f0}
.dh-table tr:last-child td{border-bottom:none}
.dh-tabs{display:flex;gap:0;border-bottom:1px solid #e8e8e8;margin-bottom:20px}
.dh-tab{padding:12px 18px;cursor:pointer;font-size:13.5px;color:#888;border-bottom:2px solid transparent;font-weight:500}
.dh-tab.active{color:#1a1a1a;border-color:#534AB7;font-weight:600}
.dh-h3{font-size:16px;font-weight:600;margin:0 0 14px}
@media (max-width:720px){.dh-grid-2,.dh-grid-3{grid-template-columns:1fr}.dh-hotel-info{flex-direction:column}.dh-hotel-img{width:100%;height:160px}}
</style>
</head>
<body>
<div class="dh-shell">
  <div class="dh-topbar">
    <a href="dashboard.html" class="dh-logo">
      <div class="dh-logo-icon">TW</div>
      <div class="dh-logo-text">TravelWinners</div>
    </a>
    <div class="dh-nav-right">
      <div class="dh-lang">
        <button class="active" id="lang-en">EN</button>
        <button id="lang-ko">한국어</button>
      </div>
      <span class="dh-user" id="user-email">—</span>
      <a href="settings.html" class="dh-logout" style="text-decoration:none" data-en="⚙️ Settings" data-ko="⚙️ 설정">⚙️ Settings</a>
      <button class="dh-logout" id="btn-logout" data-en="Sign out" data-ko="로그아웃">Sign out</button>
    </div>
  </div>

  <div class="dh-main" id="dh-main">
    <div class="dh-loading"><div class="dh-loader"></div><div data-en="Loading dashboard..." data-ko="대시보드 불러오는 중...">Loading dashboard...</div></div>
  </div>
</div>

<script>
(function(){
  var T = window.TW;
  var $ = T.$;
  var currentUser = null;
  var myHotel = null;

  T.requireAuth(async function(user){
    currentUser = user;
    $('user-email').textContent = user.email;
    
    var ac = await T.checkAdmin(user);
    if (ac.is_admin) {
      // 관리자는 admin.html로
      window.location.href = 'admin.html';
      return;
    }
    
    loadDashboard();
  });

  $('btn-logout').addEventListener('click', T.logout);

  // [Phase 3 Step 5] Auto-reload dashboard when:
  //   1) tab regains visibility (e.g. user came back from hotel-info edit)
  //   2) cache was invalidated (same tab via TW.db.* OR cross-tab via BroadcastChannel/storage)
  //   3) localStorage 'tw-hotels-dirty' flag (legacy fallback)
  document.addEventListener('visibilitychange', function(){
    if (!document.hidden && currentUser) {
      loadDashboard({ noCache: true });
    }
  });
  window.addEventListener('tw:cache:invalidate', function(ev){
    var k = ev && ev.detail && ev.detail.key;
    if ((k === 'hotels' || k === 'myHotels') && currentUser) loadDashboard({ noCache: true });
  });
  window.addEventListener('storage', function(ev){
    if (ev.key === 'tw-hotels-dirty' && currentUser) loadDashboard({ noCache: true });
  });

  function loadDashboard(opts){
    T.db.getMyHotels(opts || {}).then(function(r){
      var main = $('dh-main');
      
      if (r.error){
        main.innerHTML = '<div class="dh-card"><div class="dh-empty">' + (T.lang === 'ko' ? '데이터 불러오기 실패' : 'Failed to load data') + '</div></div>';
        return;
      }

      var hotels = r.data || [];
      
      if (hotels.length === 0){
        // 호텔 미등록 → 등록 유도
        renderNoHotel();
        return;
      }

      myHotel = hotels[0];
      renderDashboard();
    }).catch(function(err){
      console.error(err);
      $('dh-main').innerHTML = '<div class="dh-card"><div class="dh-empty">' + (T.lang === 'ko' ? '오류 발생' : 'Error occurred') + '</div></div>';
    });
  }

  function renderNoHotel(){
    var html = '<h1 class="dh-section-title" data-en="Welcome to TravelWinners!" data-ko="환영합니다!">Welcome to TravelWinners!</h1>';
    html += '<p class="dh-section-sub" data-en="Get started by registering your hotel." data-ko="호텔을 등록하고 시작하세요.">Get started by registering your hotel.</p>';
    html += '<div class="dh-card"><div class="dh-empty">';
    html += '<div class="dh-empty-icon">🏨</div>';
    html += '<h3 data-en="No hotel registered yet" data-ko="아직 등록된 호텔이 없습니다">No hotel registered yet</h3>';
    html += '<p style="margin-bottom:24px" data-en="Paste your Agoda URL and we\'ll auto-fill your hotel info." data-ko="아고다 URL을 붙여넣으면 호텔 정보를 자동으로 가져옵니다.">Paste your Agoda URL and we\'ll auto-fill your hotel info.</p>';
    html += '<a href="hotel-info.html" class="dh-btn dh-btn-primary" data-en="Register Hotel →" data-ko="호텔 등록하기 →">Register Hotel →</a>';
    html += '</div></div>';
    $('dh-main').innerHTML = html;
    T.switchLang(T.lang);
  }

  function renderDashboard(){
    var h = myHotel;
    var status = h.status || 'pending';
    var lang = T.lang;

    var html = '';
    
    // === 헤더 ===
    html += '<h1 class="dh-section-title">' + (lang === 'ko' ? '대시보드' : 'Dashboard') + '</h1>';
    html += '<p class="dh-section-sub">' + (lang === 'ko' ? '호텔 정보, 결제 상태, 영상 진행상황을 한눈에 확인하세요.' : 'Track your hotel info, payment status, and video progress.') + '</p>';

    // === 호텔 카드 ===
    html += '<div class="dh-card">';
    html += '<div class="dh-hotel-info">';
    var imgUrl = h.image_url || '';
    if (h.google_photos){
      try {
        var photos = (typeof h.google_photos === 'string') ? JSON.parse(h.google_photos) : h.google_photos;
        if (photos && photos.length && photos[0].url) imgUrl = photos[0].url;
      } catch (e) {}
    }
    html += '<div class="dh-hotel-img" style="background-image:url(' + esc(imgUrl) + ')"></div>';
    html += '<div class="dh-hotel-meta" style="flex:1">';
    html += '<h2>' + esc(h.hotel_name || 'Unnamed Hotel') + '</h2>';
    if (h.star_rating){
      html += '<div class="dh-hotel-meta-row">' + T.fmt.stars(h.star_rating);
      if (h.review_score) html += '  ·  ' + h.review_score + '/10 (' + (h.review_count || 0) + ' reviews)';
      html += '</div>';
    }
    if (h.address) html += '<div class="dh-hotel-meta-row">📍 ' + esc(h.address) + '</div>';
    if (h.phone) html += '<div class="dh-hotel-meta-row">📞 ' + esc(h.phone) + '</div>';
    if (h.website) html += '<div class="dh-hotel-meta-row">🌐 <a href="' + esc(h.website) + '" target="_blank" rel="noopener">' + esc(h.website) + '</a></div>';
    html += '<div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><span class="dh-status-badge" style="background:' + T.fmt.statusColor(status) + '">' + T.fmt.statusLabel(status, lang) + '</span>';
    html += '<a href="hotel-info.html?edit=1" class="dh-btn dh-btn-secondary" style="padding:6px 14px;font-size:13px" data-en="Edit Hotel Info" data-ko="호텔 정보 수정">Edit Hotel Info</a>';
    html += '</div>';
    html += '</div></div>';

    // === 진행 상태 ===
    html += '<div class="dh-progress">';
    var steps = lang === 'ko' 
      ? ['등록', '검토', '승인', '결제', '제작', '게시']
      : ['Register', 'Review', 'Approve', 'Pay', 'Produce', 'Publish'];
    var stepStatus = ['pending','review','approved','paid','producing','published'];
    var statusOrder = stepStatus.indexOf(status);
    if (statusOrder === -1) statusOrder = 0;
    
    for (var i = 0; i < steps.length; i++){
      var cls = 'dh-progress-step';
      if (i < statusOrder) cls += ' done';
      else if (i === statusOrder) cls += ' active';
      html += '<div class="' + cls + '">' + steps[i] + '</div>';
    }
    html += '</div>';
    html += '</div>';

    // === 상태별 분기 ===
    if (status === 'pending' || status === 'review'){
      // 대기/검토 중
      html += '<div class="dh-card">';
      html += '<div class="dh-empty">';
      html += '<div class="dh-empty-icon">⏳</div>';
      html += '<h3>' + (lang === 'ko' ? '검토 진행 중' : 'Under Review') + '</h3>';
      html += '<p>' + (lang === 'ko' ? '제출하신 호텔 정보를 검토 중입니다. 보통 1-2 영업일 내 승인됩니다.' : 'We\'re reviewing your hotel info. Approval typically takes 1-2 business days.') + '</p>';
      html += '</div></div>';
    } else if (status === 'approved'){
      // 승인 → 결제 유도
      html += '<div class="dh-pay-card">';
      html += '<h3>' + (lang === 'ko' ? '🎉 호텔이 승인되었습니다!' : '🎉 Your hotel is approved!') + '</h3>';
      html += '<p>' + (lang === 'ko' ? '$200 영상 제작 비용을 결제하시면 6개 언어 유튜브 채널에 호텔 영상이 게시됩니다.' : 'Complete the $200 video production payment to publish your hotel video across 6-language YouTube channels.') + '</p>';
      html += '<div class="dh-pay-amount">$200 USD</div>';
      // PayPal Buttons 컨테이너 (SDK 로드 후 paypal.Buttons() 가 렌더링)
      html += '<div id="paypal-button-container" style="background:#fff;border-radius:8px;padding:16px;min-height:55px;max-width:420px"></div>';
      html += '<div id="paypal-status-note" style="margin-top:10px;font-size:12.5px;opacity:.85;min-height:18px"></div>';
      html += '<div class="dh-pay-meta">';
      html += '<span>✓ ' + (lang === 'ko' ? '안전한 PayPal 결제' : 'Secure PayPal payment') + '</span>';
      html += '<span>✓ ' + (lang === 'ko' ? '7일 이내 영상 제작 완료' : 'Video ready in 7 days') + '</span>';
      html += '<span>✓ ' + (lang === 'ko' ? '6개 언어 채널 게시' : '6-language channels') + '</span>';
      html += '</div>';
      html += '</div>';
    } else if (status === 'paid' || status === 'producing'){
      // 결제 완료 → 제작 중
      html += '<div class="dh-card">';
      html += '<h3 class="dh-h3">' + (lang === 'ko' ? '✅ 결제 완료 — 영상 제작 중' : '✅ Payment Received — Video in Production') + '</h3>';
      html += '<p style="color:#666;line-height:1.7">' + (lang === 'ko' ? '결제가 완료되었습니다. 저희 팀이 호텔 영상을 제작 중입니다. 7일 이내 게시 예정입니다.' : 'Payment received. Our team is producing your hotel video. It will be published within 7 days.') + '</p>';
      html += '</div>';
    } else if (status === 'published'){
      // 게시됨 → 통계 표시
      html += '<div class="dh-grid-3">';
      html += '<div class="dh-stat"><div class="dh-stat-label">' + (lang === 'ko' ? '총 조회수' : 'Total Views') + '</div><div class="dh-stat-value">—</div><div class="dh-stat-trend">' + (lang === 'ko' ? '집계 중' : 'Calculating') + '</div></div>';
      html += '<div class="dh-stat"><div class="dh-stat-label">' + (lang === 'ko' ? '예약 수' : 'Bookings') + '</div><div class="dh-stat-value">—</div><div class="dh-stat-trend">' + (lang === 'ko' ? '집계 중' : 'Calculating') + '</div></div>';
      html += '<div class="dh-stat"><div class="dh-stat-label">' + (lang === 'ko' ? '커미션' : 'Commission') + '</div><div class="dh-stat-value">—</div><div class="dh-stat-trend">' + (lang === 'ko' ? '집계 중' : 'Calculating') + '</div></div>';
      html += '</div>';
    } else if (status === 'rejected'){
      html += '<div class="dh-card"><div class="dh-empty">';
      html += '<div class="dh-empty-icon">❌</div>';
      html += '<h3>' + (lang === 'ko' ? '거절되었습니다' : 'Application Rejected') + '</h3>';
      html += '<p>' + (lang === 'ko' ? '문의: dgmasters01@gmail.com' : 'Contact: dgmasters01@gmail.com') + '</p>';
      html += '</div></div>';
    }

    // === 결제 내역 ===
    html += '<div class="dh-card">';
    html += '<h3 class="dh-h3">' + (lang === 'ko' ? '결제 내역' : 'Payment History') + '</h3>';
    html += '<div id="payments-area"><div class="dh-loader"></div></div>';
    html += '</div>';

    $('dh-main').innerHTML = html;
    T.switchLang(lang);

    // 결제 버튼: 'approved' 상태일 때만 PayPal Buttons 렌더링
    if (status === 'approved'){
      initPayPalButtons();
    }

    // 결제 내역 로드
    loadPayments();
  }

  // ==========================================================
  // PayPal 결제 통합
  // ==========================================================
  var _paypalSdkLoaded = false;
  var _paypalConfig = null;

  /**
   * PayPal SDK 동적 로드 + Buttons 렌더링
   * 1) /api/paypal?action=config 호출 → client_id, env 획득
   * 2) https://www.paypal.com/sdk/js?client-id=... 스크립트 로드
   * 3) paypal.Buttons({...}).render('#paypal-button-container')
   */
  function initPayPalButtons(){
    var container = document.getElementById('paypal-button-container');
    var note = document.getElementById('paypal-status-note');
    if (!container) return;

    setStatusNote(T.lang === 'ko' ? '결제 시스템 로딩 중...' : 'Loading payment system...', '');

    fetch('/api/paypal?action=config')
      .then(function(r){ return r.json(); })
      .then(function(cfg){
        if (!cfg.clientId){
          setStatusNote(T.lang === 'ko' ? '결제 시스템 설정 오류' : 'Payment system not configured', 'error');
          return;
        }
        _paypalConfig = cfg;
        return loadPayPalSdk(cfg.clientId);
      })
      .then(function(){
        if (!_paypalSdkLoaded || !window.paypal) return;
        renderPayPalButtons();
      })
      .catch(function(err){
        console.error('PayPal init failed:', err);
        setStatusNote(T.lang === 'ko' ? '결제 시스템 로딩 실패. 잠시 후 다시 시도하세요.' : 'Failed to load payment system. Try again later.', 'error');
      });
  }

  function loadPayPalSdk(clientId){
    return new Promise(function(resolve, reject){
      if (window.paypal){ _paypalSdkLoaded = true; resolve(); return; }
      var script = document.createElement('script');
      var qs = 'client-id=' + encodeURIComponent(clientId) + '&currency=USD&intent=capture&disable-funding=credit,card';
      script.src = 'https://www.paypal.com/sdk/js?' + qs;
      script.async = true;
      script.onload = function(){ _paypalSdkLoaded = true; resolve(); };
      script.onerror = function(){ reject(new Error('PayPal SDK load failed')); };
      document.head.appendChild(script);
    });
  }

  function renderPayPalButtons(){
    if (!window.paypal || !window.paypal.Buttons){
      setStatusNote(T.lang === 'ko' ? 'PayPal SDK 로딩 실패' : 'PayPal SDK failed', 'error');
      return;
    }
    var container = document.getElementById('paypal-button-container');
    if (!container) return;
    container.innerHTML = ''; // 중복 렌더링 방지

    window.paypal.Buttons({
      style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'paypal', height: 45 },

      // 1. 서버에 Order 생성 요청
      createOrder: function(){
        setStatusNote(T.lang === 'ko' ? '결제 준비 중...' : 'Preparing payment...', '');
        return getAuthHeader().then(function(authHdr){
          return fetch('/api/paypal?action=create-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': authHdr },
            body: JSON.stringify({ hotel_id: myHotel.id }),
          });
        }).then(function(r){ return r.json().then(function(d){ return { ok: r.ok, status: r.status, data: d }; }); })
          .then(function(res){
            if (!res.ok){
              var msg = (res.data && (res.data.reason || res.data.error)) || 'create_order_failed';
              setStatusNote((T.lang === 'ko' ? '결제 생성 실패: ' : 'Order creation failed: ') + msg, 'error');
              throw new Error(msg);
            }
            setStatusNote('', '');
            return res.data.order_id;
          });
      },

      // 2. 사용자가 PayPal 창에서 승인 완료 → 서버에 capture 요청
      onApprove: function(data){
        setStatusNote(T.lang === 'ko' ? '결제 처리 중...' : 'Processing payment...', '');
        return getAuthHeader().then(function(authHdr){
          return fetch('/api/paypal?action=capture-order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': authHdr },
            body: JSON.stringify({ order_id: data.orderID, hotel_id: myHotel.id }),
          });
        }).then(function(r){ return r.json().then(function(d){ return { ok: r.ok, status: r.status, data: d }; }); })
          .then(function(res){
            if (!res.ok || !res.data || !res.data.ok){
              var detail = (res.data && (res.data.detail || res.data.error)) || 'capture_failed';
              setStatusNote((T.lang === 'ko' ? '결제 확정 실패: ' : 'Payment capture failed: ') + detail, 'error');
              return;
            }
            setStatusNote(T.lang === 'ko' ? '✅ 결제가 완료되었습니다! 대시보드를 새로고침합니다...' : '✅ Payment complete! Refreshing dashboard...', 'success');
            T.toast(T.lang === 'ko' ? '결제 완료!' : 'Payment complete!');
            // hotels.status는 트리거가 'paid'로 자동 전환 → 대시보드 다시 로드
            setTimeout(function(){
              if (T.cache && T.cache.invalidate){
                T.cache.invalidate('hotels');
                T.cache.invalidate('myHotels');
              }
              loadDashboard({ noCache: true });
            }, 1500);
          });
      },

      onCancel: function(){
        setStatusNote(T.lang === 'ko' ? '결제가 취소되었습니다.' : 'Payment cancelled.', '');
      },

      onError: function(err){
        console.error('PayPal Buttons error:', err);
        setStatusNote(T.lang === 'ko' ? '결제 중 오류가 발생했습니다. 다시 시도해주세요.' : 'Payment error occurred. Please try again.', 'error');
      },
    }).render('#paypal-button-container').catch(function(e){
      console.error('PayPal render failed:', e);
      setStatusNote(T.lang === 'ko' ? 'PayPal 버튼 표시 실패' : 'Failed to render PayPal buttons', 'error');
    });
  }

  function getAuthHeader(){
    if (T.sb && T.sb.auth && T.sb.auth.getSession){
      return T.sb.auth.getSession().then(function(r){
        var token = r && r.data && r.data.session && r.data.session.access_token;
        return 'Bearer ' + (token || '');
      });
    }
    return Promise.resolve('');
  }

  function setStatusNote(text, kind){
    var n = document.getElementById('paypal-status-note');
    if (!n) return;
    n.textContent = text || '';
    if (kind === 'error') n.style.color = '#ffd2d2';
    else if (kind === 'success') n.style.color = '#c8ffd2';
    else n.style.color = '';
  }
  // ==========================================================

  function loadPayments(){
    T.db.getPayments(myHotel.id).then(function(r){
      var area = document.getElementById('payments-area');
      if (!area) return;
      
      var payments = r.data || [];
      if (payments.length === 0){
        area.innerHTML = '<div style="color:#888;font-size:13px;padding:8px 0">' + (T.lang === 'ko' ? '결제 내역이 없습니다.' : 'No payments yet.') + '</div>';
        return;
      }

      var html = '<table class="dh-table">';
      html += '<thead><tr>';
      html += '<th>' + (T.lang === 'ko' ? '날짜' : 'Date') + '</th>';
      html += '<th>' + (T.lang === 'ko' ? '금액' : 'Amount') + '</th>';
      html += '<th>' + (T.lang === 'ko' ? '방법' : 'Method') + '</th>';
      html += '<th>' + (T.lang === 'ko' ? '상태' : 'Status') + '</th>';
      html += '</tr></thead><tbody>';
      payments.forEach(function(p){
        html += '<tr>';
        html += '<td>' + T.fmt.date(p.created_at) + '</td>';
        html += '<td>' + T.fmt.money(p.amount, p.currency || 'USD') + '</td>';
        html += '<td>' + esc(p.method || '-') + '</td>';
        html += '<td>' + esc(p.status || '-') + '</td>';
        html += '</tr>';
      });
      html += '</tbody></table>';
      area.innerHTML = html;
    });
  }

  function esc(s){
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

})();
</script>
</body>
</html>
