  <!-- ============ NO-SHOW POLICY EXPLAINER ============ -->
  <rect class="card-soft" x="32" y="1510" width="1216" height="120"/>
  <text x="52" y="1542" class="h3">💡 노쇼·취소 매출 처리 정책</text>
  <text x="52" y="1566" class="body">• <tspan font-weight="600" fill="#10B981">노쇼 = 매출 포함</tspan> (호텔 측은 객실을 비워두었기 때문에 결제는 유효). 별도 카드로 정직하게 표시합니다.</text>
  <text x="52" y="1586" class="body">• <tspan font-weight="600" fill="#EF4444">취소 = 매출 제외</tspan> (체크인 전 정상 절차에 따라 환불된 건). 위 매출에는 5건 취소 분 제외 후 집계.</text>
  <text x="52" y="1610" class="muted">이번 계약 기간 노쇼 발생: 0건 / 정상 취소: 5건 — 출처: docs/design/BL-MGR-DASHBOARD-V1/decisions-summary.md v2</text>

  <!-- ============ POLICY ANNOTATION ============ -->
  <rect class="card-soft" x="32" y="1660" width="1216" height="220"/>
  <text x="52" y="1692" class="h3">📌 와이어프레임 v2 정책 박제 (정정 #10·#11·#12·#13)</text>
  <text x="52" y="1718" class="body">• #10: 본편 + 추가 노출 분리하지 않고 통합 표시 (추가 노출은 본편의 서비스성 부속물, 영상 탭 #3 원칙과 일관)</text>
  <text x="52" y="1738" class="body">• #11: 채널 박스 2개(한국/해외) 삭제. 채널 명단은 영상 탭에서만. 분석 탭은 국가 단위로만 표시.</text>
  <text x="52" y="1758" class="body">• #12: 노쇼 매출 카드 신설. "0건"일 때 회색 처리 + "이번 계약 기간 노쇼 발생 0건" 정직 표시.</text>
  <text x="52" y="1778" class="body">• #13: ADR(평균 객단가)·인기 요일·채널별 조회수는 BL-MGR-DASHBOARD-V1.1로 미룸. "곧 추가될 분석" 섹션에 예고.</text>
  <text x="52" y="1808" class="body">• 분석 탭 기본 정책: 8개 채널 → Agoda 제휴링크 → 호텔 직접 예약 흐름의 정직한 집계.</text>
  <text x="52" y="1828" class="body">• CSV 내보내기 = 회계팀 전달용. 월별/국가별 raw 데이터.</text>
  <text x="52" y="1856" class="muted">출처: decisions-summary.md v2 + BACKLOG.md (BL-MGR-DASHBOARD-V1.1)</text>
</svg>
