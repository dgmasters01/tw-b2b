<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TravelWinners B2B — Marketing & Bookings</title>
<meta name="description" content="Hotel marketing dashboard — track bookings, channel performance, and ROI across 8 YouTube channels in 6 languages.">
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared.js"></script>
<style>
/* ===== marketing.html — v2 Aurora bookings dashboard ===== */
/* shared.css v2 가 base 톤·컬러·폰트·aurora-bg·glass 모두 제공 */

/* ---------- Topbar ---------- */
.mk-topbar{
  position:sticky;top:0;z-index:900;
  background:rgba(10,10,15,.72); backdrop-filter:blur(16px) saturate(140%);
  -webkit-backdrop-filter:blur(16px) saturate(140%);
  border-bottom:1px solid var(--line);
  padding:0 32px; display:flex; align-items:center; justify-content:space-between;
  height:64px;
}
.mk-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
.mk-logo-icon{
  width:32px;height:32px;border-radius:8px;
  background:var(--aurora);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#fff;
  box-shadow:var(--glow-p);
  font-family:var(--display);
}
.mk-logo-text{font-family:var(--display);font-size:16px;font-weight:700;color:var(--ink);letter-spacing:-.01em}
.mk-nav-right{display:flex;gap:10px;align-items:center}
.mk-user{font-size:13px;color:var(--ink-3);margin-right:6px}
.mk-btn-out{
  background:var(--glass); border:1px solid var(--line-2);
  color:var(--ink-2); padding:8px 14px; border-radius:8px;
  cursor:pointer; font-size:13px; font-family:var(--sans);
  text-decoration:none; transition:var(--transition);
}
.mk-btn-out:hover{background:var(--glass-2); color:var(--ink); border-color:var(--line-3)}

/* ---------- Shell ---------- */
.mk-shell{max-width:1280px;margin:0 auto;padding:0 32px;position:relative;z-index:2}
.mk-main{padding:48px 0 80px}

.mk-h1{
  font-family:var(--display);
  font-size:38px;font-weight:700;color:var(--ink);
  line-height:1.05;letter-spacing:-.025em;
  margin:0 0 8px;
}
.mk-h1 em{
  font-style:normal;font-weight:800;
  background:var(--aurora);
  -webkit-background-clip:text;background-clip:text;
  color:transparent;
}
.mk-sub{
  color:var(--ink-3);font-size:15px;line-height:1.55;
  margin:0 0 32px;
}
.mk-h2{
  font-family:var(--display);font-size:20px;font-weight:700;
  color:var(--ink);margin:0 0 18px;letter-spacing:-.01em;
}

/* ---------- Loading ---------- */
.mk-loading{
  display:flex;flex-direction:column;align-items:center;
  padding:80px 20px;gap:16px;color:var(--ink-3);font-size:14px;
}
.mk-loader{
  display:inline-block;width:28px;height:28px;
  border:2px solid var(--line-2); border-top-color:var(--aurora-1);
  border-radius:50%;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- Generic card (glass) ---------- */
.mk-card{
  background:var(--glass); border:1px solid var(--line-2);
  border-radius:var(--r-lg);
  backdrop-filter:blur(20px) saturate(140%);
  box-shadow:var(--sh-2);
  padding:28px 32px;margin-bottom:18px;
  position:relative;overflow:hidden;
}

/* ---------- Headline (4 KPIs) ---------- */
.mk-headline{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.mk-stat{
  background:var(--glass); border:1px solid var(--line-2);
  border-radius:var(--r-lg);
  backdrop-filter:blur(18px);
  padding:22px 24px;
  position:relative;overflow:hidden;
}
.mk-stat::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--aurora-2),transparent);
  opacity:.5;
}
.mk-stat-label{
  font-size:11px;color:var(--ink-3);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:10px;font-weight:700;
}
.mk-stat-value{
  font-family:var(--display);font-size:34px;font-weight:800;
  color:var(--ink);letter-spacing:-.02em;line-height:1;
}
.mk-stat-value.aurora{
  background:var(--aurora);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.mk-stat-sub{font-size:12px;color:var(--ink-4);margin-top:6px}
.mk-stat-roi{
  background:linear-gradient(135deg,#34D9A4,#10B981);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}

/* ---------- Channel grid ---------- */
.mk-channel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.mk-channel-card{
  background:var(--glass-2); border:1px solid var(--line-2);
  border-radius:var(--r);
  backdrop-filter:blur(16px);
  padding:18px 20px;
  transition:var(--transition);
}
.mk-channel-card:hover{
  border-color:var(--line-3);
  background:var(--glass-3);
  transform:translateY(-1px);
}
.mk-ch-name{
  font-weight:600;font-size:14px;color:var(--ink-2);
  margin-bottom:10px;display:flex;justify-content:space-between;
  align-items:center;gap:8px;
}
.mk-ch-count{
  font-family:var(--display);font-size:28px;font-weight:800;
  color:var(--ink);letter-spacing:-.02em;line-height:1;
}
.mk-ch-count-sub{font-size:11.5px;color:var(--ink-3);margin-top:4px;letter-spacing:.04em;text-transform:uppercase}
.mk-ch-amount{
  font-size:14px;font-weight:700;margin-top:10px;
  background:linear-gradient(135deg,#34D9A4,#10B981);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.mk-ch-bar{
  height:4px;background:rgba(255,255,255,.06);
  border-radius:99px;margin-top:12px;overflow:hidden;
}
.mk-ch-bar-fill{
  height:100%;
  background:var(--aurora);
  transition:width .5s ease;
  box-shadow:0 0 8px rgba(124,58,237,.5);
}

/* Channel language tags */
.mk-channel-tag{
  display:inline-flex;align-items:center;
  padding:3px 10px;border-radius:99px;
  font-size:10.5px;font-weight:700;letter-spacing:.04em;
  text-transform:uppercase;border:1px solid transparent;
}
.mk-channel-tag.ch-ko    {background:rgba(124,58,237,.18); color:#B89BF5; border-color:rgba(124,58,237,.32)}
.mk-channel-tag.ch-en    {background:rgba(16,185,129,.16); color:#34D9A4; border-color:rgba(16,185,129,.3)}
.mk-channel-tag.ch-ja    {background:rgba(245,158,11,.16); color:#FBBF40; border-color:rgba(245,158,11,.3)}
.mk-channel-tag.ch-vi    {background:rgba(236,72,153,.16); color:#F472B6; border-color:rgba(236,72,153,.3)}
.mk-channel-tag.ch-zh-tw {background:rgba(6,182,212,.16); color:#5DD8E8; border-color:rgba(6,182,212,.3)}
.mk-channel-tag.ch-other {background:var(--glass-2); color:var(--ink-3); border-color:var(--line-2)}

/* ---------- Bookings list ---------- */
.mk-booking-list{display:grid;grid-template-columns:1fr;gap:10px}
.mk-booking-card{
  background:var(--glass-2); border:1px solid var(--line-2);
  border-radius:var(--r);
  backdrop-filter:blur(14px);
  padding:16px 20px;
  display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;
  transition:var(--transition);
}
.mk-booking-card:hover{
  border-color:var(--line-3);
  background:var(--glass-3);
}
.mk-bk-id{
  font-family:var(--mono);font-size:13px;color:var(--ink);
  font-weight:600;letter-spacing:.02em;
}
.mk-bk-meta{
  font-size:12.5px;color:var(--ink-3);
  display:flex;gap:14px;flex-wrap:wrap;margin-top:6px;align-items:center;
}
.mk-bk-meta-item{display:inline-flex;align-items:center;gap:5px}
.mk-bk-amount{
  font-family:var(--display);font-size:20px;font-weight:800;
  text-align:right;line-height:1;
  background:linear-gradient(135deg,#34D9A4,#10B981);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.mk-bk-amount-sub{font-size:11px;color:var(--ink-4);text-align:right;margin-top:4px}

/* ---------- Empty state ---------- */
.mk-empty{
  text-align:center;padding:48px 24px;
  color:var(--ink-3);font-size:14px;line-height:1.6;
}
.mk-empty-icon{
  font-size:32px;margin-bottom:12px;opacity:.5;
}

/* ---------- Helper text ---------- */
.mk-foot-note{
  margin:18px 0 0;font-size:13px;color:var(--ink-3);
  line-height:1.55;
}
.mk-link{
  color:var(--aurora-2);text-decoration:none;font-weight:600;
  transition:var(--transition);
}
.mk-link:hover{color:#F472B6;text-decoration:underline}

@media (max-width:960px){
  .mk-headline{grid-template-columns:repeat(2,1fr)}
}
@media (max-width:600px){
  .mk-h1{font-size:30px}
  .mk-headline{grid-template-columns:1fr;gap:10px}
  .mk-booking-card{grid-template-columns:1fr;gap:10px}
  .mk-bk-amount{text-align:left}
  .mk-bk-amount-sub{text-align:left}
  .mk-shell{padding:0 18px}
  .mk-topbar{padding:0 18px}
  .mk-card,.mk-stat{padding:20px}
}
</style>
</head>
<body>

<!-- Aurora background (v2 standard) -->
<div class="aurora-bg" aria-hidden="true">
  <div class="aurora-blob b1"></div>
  <div class="aurora-blob b2"></div>
  <div class="aurora-blob b3"></div>
  <div class="aurora-blob b4"></div>
</div>
<div class="aurora-grid" aria-hidden="true"></div>

<!-- BL-COMMON-HEADER-UNIFY -->
<header id="tw-common-header"></header>

<div class="mk-shell">
  <div class="mk-main" id="mk-main">
    <div class="mk-loading"><div class="mk-loader"></div><div>Loading bookings…</div></div>
  </div>
</div>

<script>
(function(){
  var T = window.TW;
  var $ = T.$;
  var currentUser = null;
  var currentSession = null;

  T.requireAuth(async function(user){
    currentUser = user;
    // BL-COMMON-HEADER-UNIFY
    if (typeof T.renderCommonHeader === 'function') {
      T.renderCommonHeader({ activeTab: 'marketing' });
    }
    var ue = $('user-email');
    if (ue) ue.textContent = user.email;

    var ac = await T.checkAdmin(user);
    if (ac.is_admin) {
      window.location.href = 'admin.html';
      return;
    }

    // 호텔 + status 확인
    var hotelResp = await T.sb
      .from('hotels')
      .select('*')
      .eq('user_id', user.id)
      .maybeSingle();
    var hotel = hotelResp.data;
    var status = hotel ? (hotel.status || 'pending') : null;

    // 결제 전이면 sales.html 로 redirect
    if (!hotel || status === 'pending' || status === 'review' || status === 'approved' || status === 'rejected') {
      window.location.href = 'sales.html';
      return;
    }

    // 토큰 확보 (API 호출용)
    var sessionResp = await T.sb.auth.getSession();
    currentSession = sessionResp.data.session;

    loadBookings(hotel);
  });

  // BL-COMMON-HEADER-UNIFY: fallback (공통 헤더가 #tw-signout-btn 박음)
  var legacyLogoutBtn = $('btn-logout');
  if (legacyLogoutBtn) legacyLogoutBtn.addEventListener('click', T.logout);

  async function loadBookings(hotel) {
    try {
      var token = currentSession ? currentSession.access_token : '';
      var url = '/api/hotel-bookings?hotelId=' + encodeURIComponent(hotel.id);
      var resp = await fetch(url, {
        headers: { Authorization: 'Bearer ' + token }
      });
      var data = await resp.json();
      if (!resp.ok) {
        renderError(hotel, data.error || 'Failed to load bookings');
        return;
      }
      renderMarketing(hotel, data);
    } catch (err) {
      renderError(hotel, String(err));
    }
  }

  function renderError(hotel, msg) {
    var html = '';
    html += '<h1 class="mk-h1">' + (hotel.hotel_name || 'Your hotel') + '</h1>';
    html += '<p class="mk-sub">Booking analytics & channel performance</p>';
    html += '<div class="mk-card"><div class="mk-empty"><div class="mk-empty-icon">⚠️</div>' + msg + '</div></div>';
    $('mk-main').innerHTML = html;
  }

  function renderMarketing(hotel, data) {
    var html = '';
    html += '<h1 class="mk-h1">' + (hotel.hotel_name || 'Your hotel') + '</h1>';
    html += '<p class="mk-sub">Booking <em style="font-style:normal;color:var(--ink-2)">analytics</em> &amp; channel performance';
    if (hotel.city || hotel.country) {
      html += ' · ' + (hotel.city || '') + (hotel.country ? ', ' + hotel.country : '');
    }
    html += '</p>';

    // ----- HEADLINE (4 KPIs) -----
    var h = data.headline || {};
    html += '<div class="mk-headline">';
    html += statCard('Bookings', String(h.booking_count || 0), '', false, true);
    html += statCard('Estimated revenue', '$' + fmtMoney(h.total_amount_usd || 0), 'across all bookings', false, true);
    html += statCard('Total nights', String(h.total_nights || 0), 'guest nights booked');
    html += statCard('ROI', (h.roi_multiple || 0) + 'x', 'on $' + (h.subscription_usd || 200) + ' fee', true);
    html += '</div>';

    // ----- 채널별 전환 분석 -----
    html += '<div class="mk-card">';
    html += '<h2 class="mk-h2">Channel performance</h2>';
    var stats = data.channel_stats || [];
    if (stats.length === 0) {
      html += '<div class="mk-empty"><div class="mk-empty-icon">📊</div>No channel data yet — bookings will appear here once your video starts converting.</div>';
    } else {
      var maxCount = stats.reduce(function(m, s){ return Math.max(m, s.booking_count); }, 1);
      html += '<div class="mk-channel-grid">';
      for (var i = 0; i < stats.length; i++) {
        var s = stats[i];
        var langClass = 'ch-' + (s.channel_language || 'other');
        var pct = Math.round((s.booking_count / maxCount) * 100);
        html += '<div class="mk-channel-card">';
        html += '  <div class="mk-ch-name">';
        html += '    <span>' + (s.channel_name || 'Unknown') + '</span>';
        html += '    <span class="mk-channel-tag ' + langClass + '">' + (s.channel_language || '—') + '</span>';
        html += '  </div>';
        html += '  <div class="mk-ch-count">' + s.booking_count + '</div>';
        html += '  <div class="mk-ch-count-sub">bookings</div>';
        html += '  <div class="mk-ch-amount">$' + fmtMoney(s.gross_amount_usd) + '</div>';
        html += '  <div class="mk-ch-bar"><div class="mk-ch-bar-fill" style="width:' + pct + '%"></div></div>';
        html += '</div>';
      }
      html += '</div>';
    }
    html += '<p class="mk-foot-note">Bookings are tracked through Agoda Affiliate. Channels with no bookings yet may still be driving views — check <a class="mk-link" href="https://partners.agoda.com" target="_blank" rel="noopener">Agoda Partner Hub</a> for raw analytics.</p>';
    html += '</div>';

    // ----- 예약 목록 -----
    html += '<div class="mk-card">';
    html += '<h2 class="mk-h2">Recent bookings</h2>';
    var bookings = data.bookings || [];
    if (bookings.length === 0) {
      html += '<div class="mk-empty"><div class="mk-empty-icon">🌙</div>No completed bookings yet. Once guests check out, their bookings will appear here.</div>';
    } else {
      html += '<div class="mk-booking-list">';
      for (var j = 0; j < bookings.length; j++) {
        var b = bookings[j];
        var langClass2 = 'ch-' + (b.channel_language || 'other');
        html += '<div class="mk-booking-card">';
        html += '  <div>';
        html += '    <div class="mk-bk-id">#' + (b.booking_id_masked || '—') + '</div>';
        html += '    <div class="mk-bk-meta">';
        html += '      <span class="mk-bk-meta-item">📅 ' + (b.checkin_date || '?') + ' → ' + (b.checkout_date || '?') + '</span>';
        html += '      <span class="mk-bk-meta-item">🌙 ' + (b.nights || 0) + ' nights</span>';
        if (b.customer_country) html += '      <span class="mk-bk-meta-item">🌍 ' + b.customer_country + '</span>';
        html += '      <span class="mk-channel-tag ' + langClass2 + '">' + (b.channel_name || 'Other') + '</span>';
        html += '    </div>';
        html += '  </div>';
        html += '  <div>';
        html += '    <div class="mk-bk-amount">$' + fmtMoney(b.booking_amount_usd) + '</div>';
        if (b.commission_usd) html += '    <div class="mk-bk-amount-sub">Comm. $' + fmtMoney(b.commission_usd) + '</div>';
        html += '  </div>';
        html += '</div>';
      }
      html += '</div>';
    }

    // ── 환불·취소 요청 (BL-REFUND-FLOW · D-033 매니저 본인 신청) ──
    window.__twRefundCtx = { hotelId: hotel.id, hotelName: hotel.hotel_name || '' };
    html += '<h2 class="mk-h2" style="margin-top:48px">Refund / Cancellation</h2>';
    html += '<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(201,168,76,0.2);border-radius:12px;padding:24px;margin-bottom:24px">';
    html += '  <p style="color:#9aa;margin:0 0 16px;font-size:14px;line-height:1.6">You can request a refund or cancellation for your marketing campaign. Requests are reviewed by our team, and the result will be sent to your registered email.</p>';
    html += '  <button onclick="twRefundRequest()" style="background:#C9A84C;color:#0E1410;border:none;padding:12px 24px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px">↩️ Request Refund / Cancellation</button>';
    html += '  <div id="mk-refund-msg" style="margin-top:14px;font-size:14px;line-height:1.5"></div>';
    html += '</div>';

    html += '</div>';

    $('mk-main').innerHTML = html;
  }

  function statCard(label, value, sub, roi, aurora) {
    var cls = 'mk-stat-value';
    if (roi) cls += ' mk-stat-roi';
    else if (aurora) cls += ' aurora';
    return '<div class="mk-stat">'
      + '<div class="mk-stat-label">' + label + '</div>'
      + '<div class="' + cls + '">' + value + '</div>'
      + (sub ? '<div class="mk-stat-sub">' + sub + '</div>' : '')
      + '</div>';
  }

  function fmtMoney(n) {
    var v = Number(n) || 0;
    return v.toLocaleString('en-US', { maximumFractionDigits: 0 });
  }

  // ── 환불·취소 요청 처리 (RLS: 매니저 본인 + status=pending insert 허용) ──
  window.twRefundRequest = async function () {
    var ctx = window.__twRefundCtx || {};
    var msgEl = document.getElementById('mk-refund-msg');
    function say(color, text) { if (msgEl) { msgEl.style.color = color; msgEl.textContent = text; } }

    if (!ctx.hotelId || !currentUser) {
      say('#c0392b', 'Could not load your session. Please refresh the page and try again.');
      return;
    }

    // 중복 방지 — 이미 대기 중인 신청이 있으면 차단
    try {
      var existing = await T.sb
        .from('refund_requests')
        .select('id')
        .eq('hotel_id', ctx.hotelId)
        .eq('status', 'pending')
        .limit(1);
      if (existing && existing.data && existing.data.length) {
        say('#e0a93c', 'You already have a pending refund request. Please wait for the review result.');
        return;
      }
    } catch (e) { /* 조회 실패는 무시하고 신청 진행 */ }

    var reason = window.prompt('Please enter the reason for your refund / cancellation (required, min. 5 characters):', '');
    if (reason === null) return; // 사용자가 취소
    reason = (reason || '').trim();
    if (reason.length < 5) {
      say('#c0392b', 'Please enter at least 5 characters.');
      return;
    }

    say('#9aa', 'Submitting your request…');
    try {
      var ins = await T.sb.from('refund_requests').insert({
        hotel_id: ctx.hotelId,
        manager_user_id: currentUser.id,
        manager_email: currentUser.email,
        reason: reason,
        status: 'pending'
      });
      if (ins && ins.error) {
        say('#c0392b', 'Failed to submit request: ' + (ins.error.message || 'Unknown error'));
        return;
      }
      say('#2ecc71', '✅ Your refund request has been submitted. We will email you the result after review.');
    } catch (e) {
      say('#c0392b', 'An error occurred while submitting your request: ' + (e.message || String(e)));
    }
  };
})();
</script>
</body>
</html>
