<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전략 메뉴 프리뷰 v1</title>
<style>
  :root{ --bg:#080d14; --card:#0b1119; --line:#1c2f45; --line2:#24384e; --txt:#e6eef6; --sub:#9db4c9; --muted:#6a85a0; --bl:#5aa9e6; --gr:#4edea3; --am:#EF9F27; --rd:#E24B4A; }
  *{box-sizing:border-box;}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Malgun Gothic",sans-serif;line-height:1.55;padding:16px 13px 70px;max-width:760px;margin:0 auto;font-size:14px;}
  .pv{background:rgba(239,159,39,.1);color:var(--am);font-size:11px;padding:7px 12px;border-radius:9px;margin-bottom:14px;text-align:center;line-height:1.5;}
  .role{display:flex;gap:6px;margin-bottom:14px;}
  .role button{flex:1;background:transparent;border:0.5px solid var(--line2);color:var(--sub);font-size:12px;padding:9px;border-radius:9px;cursor:pointer;font-family:inherit;}
  .role button.on{background:rgba(239,159,39,.14);border-color:rgba(239,159,39,.5);color:var(--am);font-weight:600;}
  h1{font-size:18px;font-weight:600;margin:0 0 3px;}
  .sub{font-size:12px;color:var(--muted);margin-bottom:14px;}
  .tabs{display:flex;gap:5px;margin-bottom:16px;flex-wrap:wrap;}
  .tab{flex:1;min-width:80px;background:transparent;border:0.5px solid var(--line2);color:var(--sub);font-size:11.5px;padding:9px 6px;border-radius:9px;cursor:pointer;font-family:inherit;text-align:center;white-space:nowrap;}
  .tab.on{background:rgba(128,140,160,.1);border-color:var(--sub);color:var(--txt);font-weight:600;}
  .tab .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:1px;}
  .d-plan{background:#8A8794;} .d-write{background:#4A90D9;} .d-sched{background:#EF9F27;} .d-pub{background:#1D9E75;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:11px;}
  .card.self{border-color:#2a3f2e;}
  .head{display:flex;align-items:center;gap:9px;cursor:pointer;}
  .htitle{flex:1;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .badges{display:inline-flex;align-items:center;gap:6px;flex:none;}
  .bdg{font-size:9.5px;padding:2px 7px;border-radius:20px;white-space:nowrap;}
  .bdg.kw{background:rgba(90,169,230,.16);color:var(--bl);}
  .bdg.self{background:rgba(29,158,117,.16);color:var(--gr);}
  .bdg.ch{background:rgba(128,140,160,.14);color:#b9c8d8;}
  .bdg.peak{color:var(--rd);border:1px solid rgba(226,75,74,.4);}
  .bdg.dday{color:var(--rd);border:1px solid rgba(226,75,74,.4);}
  .bdg.pub{background:rgba(29,158,117,.18);color:var(--gr);}
  .bdg.warn{color:var(--am);}
  .caret{display:inline-flex;width:24px;height:24px;border-radius:50%;background:rgba(128,128,128,.12);color:var(--sub);align-items:center;justify-content:center;font-size:15px;flex:none;transition:transform .15s;}
  .card.open .caret{transform:rotate(180deg);background:rgba(128,128,128,.2);}
  .submeta{font-size:10.5px;color:var(--muted);margin-top:6px;}
  .body{display:none;margin-top:10px;padding-top:11px;border-top:0.5px solid rgba(128,128,128,.15);}
  .card.open .body{display:block;}
  .idline{font-size:10.5px;color:var(--muted);margin-bottom:9px;}
  .desc{font-size:10.5px;color:#8fa8bf;line-height:1.8;}
  .desc b{color:var(--am);}
  .desc .g{color:var(--gr);font-size:10px;}
  .toph b{color:#b9c8d8;}
  .bottom{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:11px;}
  .rolebadge{font-size:9.5px;padding:2px 7px;border-radius:6px;background:rgba(239,159,39,.12);color:var(--am);}
  .pname{font-size:11px;color:var(--sub);}
  .assign{font-size:11px;color:var(--am);border:0.5px solid rgba(239,159,39,.4);border-radius:7px;padding:5px 9px;background:transparent;}
  .acts{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;}
  .btn{font-size:10.5px;border:0.5px solid var(--line2);color:var(--sub);padding:5px 10px;border-radius:7px;cursor:pointer;background:transparent;font-family:inherit;}
  .btn.go{color:var(--gr);border-color:rgba(29,158,117,.4);}
  .btn.del{color:var(--rd);border-color:rgba(226,75,74,.45);}
  .autohint{font-size:10.5px;color:var(--bl);background:rgba(90,169,230,.08);border:0.5px solid rgba(90,169,230,.22);padding:7px 10px;border-radius:8px;margin-top:10px;line-height:1.5;}
  .autohint b{color:#7dc4f5;}
  .pubrow{margin-top:10px;padding-top:9px;border-top:0.5px solid rgba(128,128,128,.15);display:flex;align-items:center;gap:7px;font-size:10.5px;}
  .pubrow a{color:var(--bl);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
  .pubmeta{font-size:10px;color:var(--muted);margin-top:8px;}
  .pubmeta b{color:var(--sub);}
  .empty{text-align:center;color:var(--muted);font-size:12px;padding:40px 0;}
  .an-ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:1000;padding:12px;}
  .an-frame{background:var(--card);border:1px solid var(--line);border-radius:14px;width:100%;max-width:820px;height:88vh;position:relative;overflow:hidden;}
  .an-frame iframe{width:100%;height:100%;border:0;border-radius:14px;background:var(--bg);}
  .an-x{position:absolute;top:10px;right:10px;z-index:2;background:rgba(11,17,25,.92);border:0.5px solid var(--line2);color:var(--txt);padding:6px 12px;border-radius:20px;cursor:pointer;font-size:12px;font-family:inherit;}
</style>
</head>
<body>

<div class="pv">📋 전략 메뉴 <b>프리뷰</b> — 샘플 데이터입니다. 발행 완료 카드의 [성과 보기]를 누르면 성과 프리뷰로 연결됩니다.</div>

<div class="role">
  <button id="r-owner" class="on" onclick="setRole('owner')">최고관리자 (삭제 보임)</button>
  <button id="r-editor" onclick="setRole('editor')">에디터 (삭제 없음)</button>
</div>

<h1>전략 · 콘텐츠 기획 큐</h1>
<div class="sub">정한 콘텐츠를 발행까지 관리 · 착수 임박순 자동 정렬</div>

<div class="tabs" id="tabs"></div>
<div id="list"></div>

<script>
var ROLE = 'owner', TAB = 'planning';

var STAGES = [
  { key:'planning', label:'기획 대기', dot:'d-plan' },
  { key:'writing',  label:'원고 작성', dot:'d-write' },
  { key:'scheduled',label:'발행 예정', dot:'d-sched' },
  { key:'published',label:'발행 완료', dot:'d-pub' }
];

var CARDS = [
  { id:'c1', stage:'planning', kind:'rec', title:'난바 호텔 TOP3 — 3성', code:'TW-0001', src:'키워드',
    country:'Japan', city:'오사카', star:3, month:'2026-09', peak:12, dday:2, planner:'이지형', assignee:null,
    hotels:'레드루프 · 리치몬드 · APA', stay:'1위 3박, 2위 2박 (전체 72%)' },
  { id:'c2', stage:'writing', kind:'rec', title:'오사카 우메다 호텔 TOP3 — 3성', code:'TW-0002', src:'키워드',
    country:'Japan', city:'오사카', star:3, month:'2026-10', peak:11, dday:3, planner:'이지형', assignee:'이지형',
    hotels:'호텔 그란비아 · 몬테레이 · ريچ몬드', stay:'1위 2박, 2위 3박 (전체 68%)' },
  { id:'c3', stage:'scheduled', kind:'rec', title:'난바 호텔 TOP3 — 3성', code:'TW-0001', src:'키워드',
    country:'Japan', city:'오사카', star:3, month:'2026-09', peak:12, dday:2, planner:'이지형', assignee:'이지형',
    hotels:'레드루프 · 리치몬드 · APA', stay:'1위 3박, 2위 2박 (전체 72%)' },
  { id:'c4', stage:'scheduled', kind:'self', title:'후쿠오카 하카타 호텔 TOP3', code:'채널-0042', src:'자체 기획',
    channel:'호텔이야', country:'일본', city:'후쿠오카 하카타', star:3, price:'10만원대', dday:4, uploader:'dgmasters01',
    top1:'도리후토 호텔 하카타', top2:'니시테츠 크룸', top3:'포르자 하카타' },
  { id:'c5', stage:'published', kind:'rec', title:'난바 호텔 TOP3 — 3성', code:'TW-0001', src:'키워드',
    channel:'여행능력자들 유튜브', country:'Japan', city:'오사카', star:3, pubdate:'2026-09-14', yt:'youtube.com/watch?v=aB3kZ...',
    uploader:'일호기', views:12400, bookings:8, hotels:'레드루프 · 리치몬드 · APA',
    top1:'레드루프 인 오사카 난바', top2:'리치몬드 호텔 난바', top3:'APA 호텔 난바 에키마에' },
  { id:'c6', stage:'published', kind:'self', title:'후쿠오카 하카타 호텔 TOP3', code:'채널-0042', src:'자체 기획',
    channel:'호텔이야', country:'일본', city:'후쿠오카 하카타', star:3, pubdate:'2026-07-11', yt:'youtube.com/watch?v=9Fk2m...',
    uploader:'dgmasters01', views:3180, bookings:2, top1:'도리후토 호텔 하카타', top2:'니시테츠 크룸', top3:'포르자 하카타' }
];

var expanded = null;

function analyze(id){
  var c = CARDS.find(function(x){ return x.id===id; }); if(!c) return;
  var dist = c.title.indexOf('우메다')>=0 ? '우메다' : '난바';
  // 분석 = 팝업 안에 그 지역 조사 전체 (분석 모드: 그 성급만·전략으로/빵부스러기 없음)
  var url = 'studio-keyword-preview.html?dist=' + encodeURIComponent(dist) + '&mode=analysis' + (c.star ? '&star=' + c.star : '');
  var ov = document.createElement('div');
  ov.className = 'an-ov';
  ov.innerHTML = '<div class="an-frame"><button class="an-x" onclick="this.closest(\'.an-ov\').remove()">✕ 닫기</button>'+
    '<iframe src="'+url+'"></iframe></div>';
  ov.onclick = function(e){ if(e.target===ov) ov.remove(); };
  document.body.appendChild(ov);
}

function perf(id){
  var c = CARDS.find(function(x){ return x.id===id; }); if(!c) return;
  var owner = ROLE==='owner';
  var d = new Date(c.pubdate); d.setDate(d.getDate()+183);
  var reAgain = d.toISOString().slice(0,10);

  function pf(lbl,val,tone){
    var bg = tone==='ok'?'rgba(78,222,163,.12)':(tone==='fee'?'rgba(239,159,39,.12)':'rgba(128,140,160,.06)');
    var vc = tone==='ok'?'var(--gr)':'var(--muted)';
    var lc = tone==='ok'?'var(--gr)':'var(--sub)';
    return '<div style="background:'+bg+';border-radius:8px;padding:9px 10px;">'+
      '<div style="font-size:10px;color:'+lc+';">'+lbl+'</div>'+
      '<div style="font-size:17px;font-weight:600;color:'+vc+';margin-top:2px;">'+val+'</div></div>';
  }
  var nums = pf('영상 조회수', c.views.toLocaleString(),'ok')+
    pf('아고다 클릭','준비중')+ pf('예약','준비중')+ pf('확정률','준비중')+ pf('예약금액','준비중')+
    (owner ? pf('수수료 · 최고관리자','준비중','fee') : '');

  var svg = '<svg viewBox="0 0 520 210" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto;">'+
    '<line x1="48" y1="30" x2="500" y2="30" stroke="var(--line)"/><line x1="48" y1="73.3" x2="500" y2="73.3" stroke="var(--line)"/>'+
    '<line x1="48" y1="116.7" x2="500" y2="116.7" stroke="var(--line)"/><line x1="48" y1="160" x2="500" y2="160" stroke="var(--line2)"/>'+
    '<text x="42" y="34" text-anchor="end" fill="var(--muted)" font-size="9">6,000</text>'+
    '<text x="42" y="77" text-anchor="end" fill="var(--muted)" font-size="9">4,000</text>'+
    '<text x="42" y="120" text-anchor="end" fill="var(--muted)" font-size="9">2,000</text>'+
    '<text x="42" y="163" text-anchor="end" fill="var(--muted)" font-size="9">0</text>'+
    '<rect x="74" y="47.3" width="38" height="112.7" rx="3" fill="var(--gr)"/>'+
    '<rect x="164.6" y="86.3" width="38" height="73.7" rx="3" fill="var(--gr)"/>'+
    '<rect x="255" y="114.5" width="38" height="45.5" rx="3" fill="var(--gr)"/>'+
    '<rect x="345.4" y="138.3" width="38" height="21.7" rx="3" fill="var(--gr)"/>'+
    '<rect x="435.8" y="144.8" width="38" height="15.2" rx="3" fill="var(--gr)"/>'+
    '<text x="93" y="42" text-anchor="middle" fill="var(--gr)" font-size="10" font-weight="600">5,200</text>'+
    '<text x="183.6" y="81" text-anchor="middle" fill="var(--gr)" font-size="10" font-weight="600">3,400</text>'+
    '<text x="274" y="109" text-anchor="middle" fill="var(--gr)" font-size="10" font-weight="600">2,100</text>'+
    '<text x="364.4" y="133" text-anchor="middle" fill="var(--gr)" font-size="10" font-weight="600">1,000</text>'+
    '<text x="454.8" y="139" text-anchor="middle" fill="var(--gr)" font-size="10" font-weight="600">700</text>'+
    '<polyline points="93,152 183.6,133 274,100 364.4,120 454.8,138" fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 4"/>'+
    '<circle cx="93" cy="152" r="3" fill="var(--muted)"/><circle cx="183.6" cy="133" r="3" fill="var(--muted)"/><circle cx="274" cy="100" r="3" fill="var(--muted)"/><circle cx="364.4" cy="120" r="3" fill="var(--muted)"/><circle cx="454.8" cy="138" r="3" fill="var(--muted)"/>'+
    '<text x="93" y="178" text-anchor="middle" fill="var(--sub)" font-size="10">1주</text>'+
    '<text x="183.6" y="178" text-anchor="middle" fill="var(--sub)" font-size="10">2주</text>'+
    '<text x="274" y="178" text-anchor="middle" fill="var(--sub)" font-size="10">3주</text>'+
    '<text x="364.4" y="178" text-anchor="middle" fill="var(--sub)" font-size="10">4주</text>'+
    '<text x="454.8" y="178" text-anchor="middle" fill="var(--sub)" font-size="10">지금</text>'+
    '<rect x="48" y="194" width="12" height="8" rx="2" fill="var(--gr)"/><text x="65" y="201" fill="var(--sub)" font-size="10">조회수 (지금 켜짐)</text>'+
    '<line x1="185" y1="198" x2="203" y2="198" stroke="var(--muted)" stroke-width="2" stroke-dasharray="5 4"/><text x="209" y="201" fill="var(--muted)" font-size="10">예약 · 예시 (추적링크 오면 실제)</text>'+
    '</svg>';

  function hrow(rk,nm){
    return '<div onclick="alert(\'이 호텔의 전체 예약·노출 이력 팝업이 뜹니다 (호텔 메뉴 화면 그대로 · 실제 스튜디오에서 연결)\')" style="display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-bottom:0.5px solid rgba(128,128,128,.12);font-size:12px;cursor:pointer;">'+
      '<span><span style="font-size:10px;font-weight:600;padding:2px 8px;border-radius:5px;background:rgba(90,169,230,.16);color:var(--bl);margin-right:8px;">'+rk+'</span>'+nm+'</span>'+
      '<span style="color:var(--muted);">예약·금액 준비중 ›</span></div>';
  }
  var hotels = hrow('TOP1',c.top1)+hrow('TOP2',c.top2)+hrow('TOP3',c.top3);

  var sec = function(t){ return '<div style="font-size:10.5px;color:var(--muted);margin:14px 0 7px;">'+t+'</div>'; };
  var html = '<div style="font-size:15px;font-weight:600;">'+c.title+'</div>'+
    '<div style="font-size:11px;color:var(--sub);margin-bottom:12px;">'+c.channel+' · '+c.pubdate+' 발행 · '+c.uploader+' 올림</div>'+
    '<div style="display:flex;gap:14px;font-size:10.5px;color:var(--sub);margin-bottom:12px;">'+
      '<span>● <span style="color:var(--gr);">지금 켜짐</span></span><span>● <span style="color:var(--muted);">준비중 (추적링크 오면 켜짐)</span></span></div>'+
    '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(88px,1fr));gap:8px;">'+nums+'</div>'+
    sec('발행 후 흐름 — 주별 · 조회는 초반, 예약은 뒤따라옴')+
    '<div style="background:rgba(128,140,160,.06);border-radius:8px;padding:12px 10px 6px;">'+svg+'</div>'+
    sec('이 영상 속 호텔 — 순위=원고 순서 · 누르면 그 호텔 전체 팝업')+
    '<div style="background:rgba(128,140,160,.06);border-radius:8px;">'+hotels+'</div>'+
    '<div style="margin-top:14px;display:flex;align-items:center;gap:8px;background:rgba(128,140,160,.06);border-radius:8px;padding:10px 12px;font-size:11.5px;color:var(--sub);">'+
      '⏱ 다시 소개 가능일: <b style="color:var(--txt);">'+reAgain+'</b> <span style="color:var(--muted);">(6개월 쿨다운 · 이 소재로 또 만들 수 있는 날)</span></div>';

  var ov = document.createElement('div');
  ov.className = 'an-ov';
  ov.innerHTML = '<div style="background:var(--card);border:1px solid var(--line);border-radius:14px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;position:relative;padding:18px 16px 22px;">'+
    '<button class="an-x" onclick="this.closest(\'.an-ov\').remove()">✕ 닫기</button>'+html+'</div>';
  ov.onclick = function(e){ if(e.target===ov) ov.remove(); };
  document.body.appendChild(ov);
}

function setRole(r){ ROLE=r; document.getElementById('r-owner').classList.toggle('on',r==='owner'); document.getElementById('r-editor').classList.toggle('on',r==='editor'); render(); }
function setTab(t){ TAB=t; expanded=null; render(); }
function toggle(id){ expanded = expanded===id ? null : id; render(); }

function renderTabs(){
  document.getElementById('tabs').innerHTML = STAGES.map(function(s){
    var n = CARDS.filter(function(c){return c.stage===s.key;}).length;
    return '<button class="tab'+(TAB===s.key?' on':'')+'" onclick="setTab(\''+s.key+'\')"><span class="dot '+s.dot+'"></span>'+s.label+' '+n+'</button>';
  }).join('');
}

function recCard(c){
  var open = expanded===c.id, showDel = ROLE==='owner';
  var stageIdx = STAGES.findIndex(function(s){return s.key===c.stage;});
  var badges = (c.dday!=null && c.stage!=='published' ? '<span class="bdg dday">D-'+c.dday+'개월</span>' : '')+
    (c.peak && c.stage!=='published' ? '<span class="bdg peak">피크 '+c.peak+'월</span>' : '')+
    (c.stage==='published' && c.channel ? '<span class="bdg ch">'+c.channel+'</span>' : '')+
    (c.stage==='published' ? '<span class="bdg pub">✓ 발행됨</span>' : '')+
    (!c.assignee && c.stage!=='published' ? '<span class="bdg warn">⚠ 담당 없음</span>' : '');
  var submeta = c.src+' · '+c.country+' · '+c.city+' · '+c.star+'성'+(c.month?' · 목표 '+c.month:'')+(c.pubdate?' · 발행 '+c.pubdate:'');
  // 단계별 버튼
  var acts = '';
  if (c.stage==='planning' || c.stage==='writing'){
    acts += '<button class="btn">'+(c.assignee?'놓기':'내가 맡기')+'</button>';
    acts += '<button class="btn" onclick="analyze(\''+c.id+'\')">분석</button>';
    if (c.stage==='writing') acts += '<button class="btn">📋 코드 복사</button>';
    if (showDel) acts += '<button class="btn del">🗑 삭제</button>';
  } else if (c.stage==='scheduled'){
    acts += '<button class="btn">내가 맡기</button>';
    acts += '<button class="btn" onclick="analyze(\''+c.id+'\')">분석</button>';
    if (showDel) acts += '<button class="btn del">🗑 삭제</button>';
  } else if (c.stage==='published'){
    acts += '<button class="btn" onclick="analyze(\''+c.id+'\')">분석</button>';
    acts += '<button class="btn go" onclick="perf(\''+c.id+'\')">성과 보기 →</button>';
  }
  var body = '<div class="idline">'+c.code+(c.month?' · 목표월 '+c.month:'')+'</div>';
  if (c.stage!=='published'){
    body += '<div class="desc">'+
      (c.peak?'<b>소개 기준</b> '+c.peak+'월(성수기)<br>':'')+
      '<b>추천 호텔</b> '+c.hotels+'<br>'+
      '<b>여행 일정</b> '+c.stay+'</div>';
  } else {
    body += '<div class="pubrow"><span style="color:var(--rd)">▶</span><a>'+c.yt+'</a></div>'+
      '<div class="pubmeta">최종 업로더 <b>'+c.uploader+'</b> · 조회 <b>'+c.views.toLocaleString()+'</b> · 예약 <b style="color:var(--muted)">준비중</b>'+
      (showDel?' · 수수료 <b style="color:var(--am)">준비중</b>':'')+'</div>';
  }
  body += '<div class="bottom"><span class="rolebadge">최종관리자</span><span class="pname">'+(c.planner||c.uploader||'')+'</span>'+
    (c.stage!=='published'?'<button class="assign">＋ 담당 지정</button>':'')+
    '<div class="acts">'+acts+'</div></div>';
  if (c.stage==='writing') body += '<div class="autohint">원고에 <b>'+c.code+'</b> 코드를 넣고 드라이브 완료 폴더에 올리면 <b>발행 예정</b>으로 자동 이동합니다.</div>';
  return '<div class="card'+(open?' open':'')+'"><div class="head" onclick="toggle(\''+c.id+'\')">'+
    '<span class="htitle">'+c.title+'</span><span class="badges"><span class="bdg kw">'+c.src+'</span>'+badges+'</span>'+
    '<span class="caret"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>'+
    '<div class="submeta">'+submeta+'</div>'+
    '<div class="body">'+body+'</div></div>';
}

function selfCard(c){
  var open = expanded===c.id;
  var badges = (c.dday!=null && c.stage!=='published' ? '<span class="bdg dday">D-'+c.dday+'개월</span>' : '')+
    (c.stage==='published' ? '<span class="bdg pub">✓ 발행됨</span>' : '');
  var submeta = '자체 기획 · '+(c.stage==='published'?'<span style="color:#b9c8d8">'+c.channel+'</span> · 발행 '+c.pubdate : c.country+' · '+c.city+' · '+c.star+'성 · '+c.price);
  var acts = '';
  if (c.stage==='scheduled'){
    acts += '<button class="btn">내가 맡기</button><button class="btn">원고 열기</button>';
    if (ROLE==='owner') acts += '<button class="btn del">🗑 삭제</button>';
  } else if (c.stage==='published'){
    acts += '<button class="btn">원고 열기</button><button class="btn go" onclick="perf(\''+c.id+'\')">성과 보기 →</button>';
  }
  var body = '<div class="idline">'+c.code+' · <span style="color:#b9c8d8">'+c.channel+'</span></div>'+
    '<div class="desc toph"><span class="g">이 영상에 나오는 호텔</span><br>'+
    '<b>TOP1</b> '+c.top1+' · <b>TOP2</b> '+c.top2+' · <b>TOP3</b> '+c.top3+'</div>';
  if (c.stage==='published'){
    body += '<div class="pubrow"><span style="color:var(--rd)">▶</span><a>'+c.yt+'</a></div>'+
      '<div class="pubmeta">최종 업로더 <b>'+c.uploader+'</b> · 조회 <b>'+c.views.toLocaleString()+'</b> · 예약 <b style="color:var(--muted)">준비중</b>'+
      (ROLE==='owner'?' · 수수료 <b style="color:var(--am)">준비중</b>':'')+'</div>';
  }
  body += '<div class="bottom"><div class="acts" style="margin-left:0">'+acts+'</div></div>';
  return '<div class="card self'+(open?' open':'')+'"><div class="head" onclick="toggle(\''+c.id+'\')">'+
    '<span class="htitle">'+c.title+'</span><span class="badges"><span class="bdg self">자체 기획</span><span class="bdg ch">'+c.channel+'</span>'+badges+'</span>'+
    '<span class="caret"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>'+
    '<div class="submeta">'+submeta+'</div>'+
    '<div class="body">'+body+'</div></div>';
}

function render(){
  renderTabs();
  var cards = CARDS.filter(function(c){return c.stage===TAB;});
  document.getElementById('list').innerHTML = cards.length
    ? cards.map(function(c){ return c.kind==='self' ? selfCard(c) : recCard(c); }).join('')
    : '<div class="empty">이 상태에 카드가 없습니다</div>';
}

render();
</script>
</body>
</html>
