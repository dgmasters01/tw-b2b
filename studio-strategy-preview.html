    sec('л°ңн–ү нӣ„ нқҗлҰ„ вҖ” мЈјлі„ В· мЎ°нҡҢлҠ” мҙҲл°ҳ, мҳҲм•ҪмқҖ л’Өл”°лқјмҳҙ')+
    '<div style="background:rgba(128,140,160,.06);border-radius:8px;padding:12px 10px 6px;">'+svg+'</div>'+
    sec('мқҙ мҳҒмғҒ мҶҚ нҳён…” вҖ” мҲңмң„=мӣҗкі  мҲңм„ң В· лҲ„лҘҙл©ҙ к·ё нҳён…” м „мІҙ нҢқм—…')+
    '<div style="background:rgba(128,140,160,.06);border-radius:8px;">'+hotels+'</div>'+
    '<div style="margin-top:14px;display:flex;align-items:center;gap:8px;background:rgba(128,140,160,.06);border-radius:8px;padding:10px 12px;font-size:11.5px;color:var(--sub);">'+
      'вҸұ лӢӨмӢң мҶҢк°ң к°ҖлҠҘмқј: <b style="color:var(--txt);">'+reAgain+'</b> <span style="color:var(--muted);">(6к°ңмӣ” мҝЁлӢӨмҡҙ В· мқҙ мҶҢмһ¬лЎң лҳҗ л§Ңл“Ө мҲҳ мһҲлҠ” лӮ )</span></div>';

  var ov = document.createElement('div');
  ov.className = 'an-ov';
  ov.innerHTML = '<div style="background:var(--card);border:1px solid var(--line);border-radius:14px;width:100%;max-width:560px;max-height:88vh;overflow-y:auto;position:relative;padding:18px 16px 22px;">'+
    '<button class="an-x" onclick="this.closest(\'.an-ov\').remove()">вң• лӢ«кё°</button>'+html+'</div>';
  ov.onclick = function(e){ if(e.target===ov) ov.remove(); };
  document.body.appendChild(ov);
}

function ytOpen(id){ var c=CARDS.find(function(x){return x.id===id;}); if(!c)return; var u=c.yt||''; if(u.indexOf('http')<0)u='https://'+u; window.open(u,'_blank'); }

function setRole(r){ ROLE=r; document.getElementById('r-owner').classList.toggle('on',r==='owner'); document.getElementById('r-editor').classList.toggle('on',r==='editor'); render(); }
function setTab(t){ TAB=t; expanded=null; render(); }
function toggle(id){ expanded = expanded===id ? null : id; render(); }

function renderTabs(){
  document.getElementById('tabs').innerHTML = STAGES.map(function(s){
    var n = CARDS.filter(function(c){return c.stage===s.key;}).length;
    return '<button class="tab'+(TAB===s.key?' on':'')+'" onclick="setTab(\''+s.key+'\')"><span class="dot '+s.dot+'"></span>'+s.label+' '+n+'</button>';
  }).join('');
}

function recCard(c){
  var open = expanded===c.id, showDel = ROLE==='owner';
  var stageIdx = STAGES.findIndex(function(s){return s.key===c.stage;});
  var badges = (c.dday!=null && c.stage!=='published' ? '<span class="bdg dday">D-'+c.dday+'к°ңмӣ”</span>' : '')+
    (c.peak && c.stage!=='published' ? '<span class="bdg peak">н”јнҒ¬ '+c.peak+'мӣ”</span>' : '')+
    (c.stage==='published' && c.channel ? '<span class="bdg ch">'+c.channel+'</span>' : '')+
    (c.stage==='published' ? '<span class="bdg pub">вң“ л°ңн–үлҗЁ</span>' : '')+
    (!c.assignee && c.stage!=='published' ? '<span class="bdg warn">вҡ  лӢҙлӢ№ м—ҶмқҢ</span>' : '');
  var submeta = c.src+' В· '+c.country+' В· '+c.city+' В· '+c.star+'м„ұ'+(c.month?' В· лӘ©н‘ң '+c.month:'')+(c.pubdate?' В· л°ңн–ү '+c.pubdate:'');
  // лӢЁкі„лі„ лІ„нҠј
  var acts = '';
  if (c.stage==='planning' || c.stage==='writing'){
    acts += '<button class="btn">'+(c.assignee?'лҶ“кё°':'лӮҙк°Җ л§Ўкё°')+'</button>';
    acts += '<button class="btn" onclick="analyze(\''+c.id+'\')">л¶„м„қ</button>';
    if (c.stage==='writing') acts += '<button class="btn">рҹ“Ӣ мҪ”л“ң ліөмӮ¬</button>';
    if (showDel) acts += '<button class="btn del">рҹ—‘ мӮӯм ң</button>';
  } else if (c.stage==='scheduled'){
    acts += '<button class="btn">лӮҙк°Җ л§Ўкё°</button>';
    acts += '<button class="btn" onclick="analyze(\''+c.id+'\')">л¶„м„қ</button>';
    if (showDel) acts += '<button class="btn del">рҹ—‘ мӮӯм ң</button>';
  } else if (c.stage==='published'){
    acts += '<button class="btn yt" onclick="ytOpen(\''+c.id+'\')">в–¶ мң нҠңлёҢм—җм„ң ліҙкё°</button>';
    acts += '<button class="btn" onclick="analyze(\''+c.id+'\')">л¶„м„қ</button>';
    acts += '<button class="btn go" onclick="perf(\''+c.id+'\')">м„ұкіј ліҙкё° вҶ’</button>';
  }
  var body = '<div class="idline">'+c.code+(c.month?' В· лӘ©н‘ңмӣ” '+c.month:'')+'</div>';
  if (c.stage!=='published'){
    body += '<div class="desc">'+
      (c.peak?'<b>мҶҢк°ң кё°мӨҖ</b> '+c.peak+'мӣ”(м„ұмҲҳкё°)<br>':'')+
      '<b>м¶”мІң нҳён…”</b> '+c.hotels+'<br>'+
      '<b>м—¬н–ү мқјм •</b> '+c.stay+'</div>';
  } else {
    body += '<div class="desc toph"><span class="g">мқҙ мҳҒмғҒм—җ лӮҳмҳЁ нҳён…”</span><br>'+
      '<b>TOP1</b> '+c.top1+' В· <b>TOP2</b> '+c.top2+' В· <b>TOP3</b> '+c.top3+'</div>'+
      '<div class="pubmeta" style="border-top:0.5px solid rgba(128,128,128,.15);margin-top:10px;padding-top:9px">мөңмў… м—…лЎңлҚ” <b>'+c.uploader+'</b> В· мЎ°нҡҢ <b>'+c.views.toLocaleString()+'</b> В· мҳҲм•Ҫ <b style="color:var(--muted)">мӨҖл№„мӨ‘</b>'+
      (showDel?' В· мҲҳмҲҳлЈҢ <b style="color:var(--am)">мӨҖл№„мӨ‘</b>':'')+'</div>';
  }
  if (c.stage==='published'){
    body += '<div class="bottom"><div class="acts" style="margin-left:0">'+acts+'</div></div>';
  } else {
    body += '<div class="bottom"><span class="rolebadge">мөңмў…кҙҖлҰ¬мһҗ</span><span class="pname">'+(c.planner||'')+'</span>'+
      '<button class="assign">пјӢ лӢҙлӢ№ м§Җм •</button><div class="acts">'+acts+'</div></div>';
  }
  if (c.stage==='writing') body += '<div class="autohint">мӣҗкі м—җ <b>'+c.code+'</b> мҪ”л“ңлҘј л„Јкі  л“ңлқјмқҙлёҢ мҷ„лЈҢ нҸҙлҚ”м—җ мҳ¬лҰ¬л©ҙ <b>л°ңн–ү мҳҲм •</b>мңјлЎң мһҗлҸҷ мқҙлҸҷн•©лӢҲлӢӨ.</div>';
  return '<div class="card'+(open?' open':'')+'"><div class="head" onclick="toggle(\''+c.id+'\')">'+
    '<span class="htitle">'+c.title+'</span><span class="badges"><span class="bdg kw">'+c.src+'</span>'+badges+'</span>'+
    '<span class="caret"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>'+
    '<div class="submeta">'+submeta+'</div>'+
    '<div class="body">'+body+'</div></div>';
}

function selfCard(c){
  var open = expanded===c.id;
  var badges = (c.dday!=null && c.stage!=='published' ? '<span class="bdg dday">D-'+c.dday+'к°ңмӣ”</span>' : '')+
    (c.stage==='published' ? '<span class="bdg pub">вң“ л°ңн–үлҗЁ</span>' : '');
  var submeta = 'мһҗмІҙ кё°нҡҚ В· '+(c.stage==='published'?'<span style="color:#b9c8d8">'+c.channel+'</span> В· л°ңн–ү '+c.pubdate : c.country+' В· '+c.city+' В· '+c.star+'м„ұ В· '+c.price);
  var acts = '';
  if (c.stage==='scheduled'){
    acts += '<button class="btn">лӮҙк°Җ л§Ўкё°</button><button class="btn">мӣҗкі  м—ҙкё°</button>';
    if (ROLE==='owner') acts += '<button class="btn del">рҹ—‘ мӮӯм ң</button>';
  } else if (c.stage==='published'){
    acts += '<button class="btn yt" onclick="ytOpen(\''+c.id+'\')">в–¶ мң нҠңлёҢм—җм„ң ліҙкё°</button><button class="btn">мӣҗкі  м—ҙкё°</button><button class="btn go" onclick="perf(\''+c.id+'\')">м„ұкіј ліҙкё° вҶ’</button>';
  }
  var body = '<div class="idline">'+c.code+' В· <span style="color:#b9c8d8">'+c.channel+'</span></div>'+
    '<div class="desc toph"><span class="g">мқҙ мҳҒмғҒм—җ лӮҳмҳЁ нҳён…”</span><br>'+
    '<b>TOP1</b> '+c.top1+' В· <b>TOP2</b> '+c.top2+' В· <b>TOP3</b> '+c.top3+'</div>';
  if (c.stage==='published'){
    body += '<div class="pubmeta" style="border-top:0.5px solid rgba(128,128,128,.15);margin-top:10px;padding-top:9px">мөңмў… м—…лЎңлҚ” <b>'+c.uploader+'</b> В· мЎ°нҡҢ <b>'+c.views.toLocaleString()+'</b> В· мҳҲм•Ҫ <b style="color:var(--muted)">мӨҖл№„мӨ‘</b>'+
      (ROLE==='owner'?' В· мҲҳмҲҳлЈҢ <b style="color:var(--am)">мӨҖл№„мӨ‘</b>':'')+'</div>';
  }
  body += '<div class="bottom"><div class="acts" style="margin-left:0">'+acts+'</div></div>';
  return '<div class="card self'+(open?' open':'')+'"><div class="head" onclick="toggle(\''+c.id+'\')">'+
    '<span class="htitle">'+c.title+'</span><span class="badges"><span class="bdg self">мһҗмІҙ кё°нҡҚ</span><span class="bdg ch">'+c.channel+'</span>'+badges+'</span>'+
    '<span class="caret"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span></div>'+
    '<div class="submeta">'+submeta+'</div>'+
    '<div class="body">'+body+'</div></div>';
}

function render(){
  renderTabs();
  var cards = CARDS.filter(function(c){return c.stage===TAB;});
  document.getElementById('list').innerHTML = cards.length
    ? cards.map(function(c){ return c.kind==='self' ? selfCard(c) : recCard(c); }).join('')
    : '<div class="empty">мқҙ мғҒнғңм—җ м№ҙл“ңк°Җ м—ҶмҠөлӢҲлӢӨ</div>';
}

render();
</script>
</body>
</html>
