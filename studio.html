<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Studio — GoHotelWinners</title>
<!--
  studio.html — BL-VIDEO-PUBLISH-INPUT-MODAL
  에디터 전용. admin OS 사이드바 없음. manager-dashboard.html 과 같은 독립 셸.
  접근: is_editor(auth.uid()) = owner | admin | editor
  RLS 가 publications 만 열어준다. bookings / payments / hotels 는 정책 자체가 없다.
-->
<link rel="stylesheet" href="shared.css" />
<style>
  :root { --st-gap: 14px; }
  body { margin:0; }
  .st-wrap { max-width: 880px; margin: 0 auto; padding: 20px 16px 60px; }
  .st-head { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:18px; }
  .st-title { font-size:19px; font-weight:500; margin:0; }
  .st-sub { font-size:12px; opacity:.65; margin-top:2px; }
  .st-tabs { display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap; }
  .st-tab { font-size:13px; padding:6px 13px; border-radius:8px; border:1px solid transparent; cursor:pointer; opacity:.65; background:none; }
  .st-tab.on { opacity:1; border-color:currentColor; }
  .st-card { border:1px solid rgba(128,128,128,.25); border-radius:12px; padding:15px 17px; margin-bottom:var(--st-gap); }
  .st-card-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:12px; }
  .st-h { font-size:15px; font-weight:500; }
  .st-badge { font-size:11px; padding:3px 9px; border-radius:8px; border:1px solid rgba(128,128,128,.35); }
  .st-badge.draft { color:#BA7517; border-color:#EF9F27; }
  .st-badge.published { color:#1D9E75; border-color:#5DCAA5; }
  .st-row { display:flex; align-items:flex-start; gap:10px; padding:7px 0; border-top:1px solid rgba(128,128,128,.14); font-size:13px; }
  .st-row:first-of-type { border-top:0; }
  .st-k { width:82px; flex:none; opacity:.6; }
  .st-v { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; opacity:.85; }
  .st-copy { flex:none; font-size:11px; padding:3px 10px; border-radius:7px; border:1px solid rgba(128,128,128,.35); background:none; cursor:pointer; }
  .st-copy:hover { border-color:currentColor; }
  .st-copy.ok { color:#1D9E75; border-color:#5DCAA5; }
  .st-warn { margin-top:11px; padding:9px 11px; border-radius:8px; border:1px solid #EF9F27; font-size:12px; line-height:1.55; }
  .st-warn b { font-weight:500; }
  .st-pub { margin-top:12px; display:flex; gap:8px; align-items:center; }
  .st-pub input { flex:1; font-size:13px; padding:8px 10px; border-radius:8px; border:1px solid rgba(128,128,128,.35); background:transparent; color:inherit; }
  .st-pub button { font-size:13px; padding:8px 15px; border-radius:8px; border:1px solid currentColor; background:none; cursor:pointer; white-space:nowrap; }
  .st-pub button:disabled { opacity:.4; cursor:default; }
  .st-done { font-size:12px; opacity:.7; margin-top:8px; }
  .st-empty { text-align:center; padding:44px 0; opacity:.55; font-size:14px; }
  .st-msg { font-size:12px; margin-top:8px; min-height:16px; }
  .st-msg.err { color:#E24B4A; }
  .st-msg.ok { color:#1D9E75; }
  .st-long { white-space:pre-wrap; word-break:break-word; }
  .st-uprow { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .st-uprow input[type=file] { flex:1; min-width:200px; font-size:13px; color:inherit; }
  .st-uprow button { font-size:13px; padding:8px 15px; border-radius:8px; border:1px solid currentColor; background:none; cursor:pointer; }
  .st-uprow button:disabled { opacity:.4; cursor:default; }
  .st-hint { font-size:12px; opacity:.55; margin-top:9px; line-height:1.55; }
  .st-pub textarea { flex:1; font-size:12px; padding:8px 10px; border-radius:8px; border:1px solid rgba(128,128,128,.35); background:transparent; color:inherit; font-family:inherit; resize:vertical; }
  .st-steps { font-size:12px; opacity:.6; line-height:1.7; margin:0 0 14px; }
</style>
</head>
<body>
<div class="st-wrap">

  <div class="st-head">
    <div>
      <h1 class="st-title">스튜디오</h1>
      <div class="st-sub" id="st-who">불러오는 중…</div>
    </div>
    <div style="display:flex; gap:8px; align-items:center">
      <a class="st-copy" id="st-admin" href="/admin.html" style="text-decoration:none; display:none">관리자</a>
      <button class="st-copy" id="st-logout">로그아웃</button>
    </div>
  </div>

  <div class="st-card" id="st-upload">
    <div class="st-card-head">
      <div class="st-h">원고 넣기</div>
      <div style="font-size:12px; opacity:.55">docx · 여러 개 한 번에</div>
    </div>
    <div class="st-uprow">
      <input type="file" id="st-file" accept=".docx" multiple />
      <button id="st-go">패키지 만들기</button>
    </div>
    <div class="st-hint">원고 파일명에 도시·지역·성급·가격대가 들어 있어야 합니다. 아고다 링크는 원고 본문에서 읽습니다.</div>
    <div class="st-msg" id="st-upmsg"></div>
  </div>

  <div class="st-tabs" id="st-tabs"></div>
  <div id="st-list"><div class="st-empty">불러오는 중…</div></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
<script src="shared.js"></script>
<script>
(function () {
  // 인증은 middleware.js 가 이미 끝냈다 (is_editor). 여기엔 인증 코드가 없다.
  // 데이터는 /api/publications 로만 오간다. 쿠키(sb-access-token)가 신분증이다.
  var rows = [], channels = {}, tab = null, ME = null;

  function esc(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  function copy(btn, text) {
    navigator.clipboard.writeText(text).then(function () {
      var old = btn.textContent;
      btn.textContent = '복사됨'; btn.classList.add('ok');
      setTimeout(function () { btn.textContent = old; btn.classList.remove('ok'); }, 1400);
    });
  }

  function rowHtml(k, shown, id) {
    return '<div class="st-row"><div class="st-k">' + esc(k) + '</div>' +
      '<div class="st-v">' + esc(shown) + '</div>' +
      '<button class="st-copy" data-copy="' + id + '">복사</button></div>';
  }

  function cardHtml(p) {
    var payload = {}, id = p.id;
    var place = [p.city, p.region].filter(Boolean).join(' ');
    var head = place + (p.star ? ' · ' + p.star + '성급' : '') + (p.price_band ? ' · ' + p.price_band : '');

    var h = '<div class="st-card" data-id="' + id + '">';
    h += '<div class="st-card-head"><div class="st-h">' + esc(head) + '</div>' +
         '<span class="st-badge ' + p.status + '">' + (p.status === 'published' ? '발행됨' : '대기') + '</span></div>';

    if (p.filename_base) { payload['fn' + id] = p.filename_base; h += rowHtml('파일명', p.filename_base, 'fn' + id); }
    if (p.title)         { payload['ti' + id] = p.title;         h += rowHtml('제목', p.title, 'ti' + id); }
    if (p.description)   { payload['de' + id] = p.description;   h += rowHtml('설명란', '아고다 링크 포함 · ' + p.description.split('\n').length + '줄', 'de' + id); }
    if (p.keywords)      { payload['kw' + id] = p.keywords;      h += rowHtml('키워드', (p.keyword_length || p.keywords.length) + '자', 'kw' + id); }
    if (p.hashtags && p.hashtags.length) { payload['ha' + id] = p.hashtags.join(' '); h += rowHtml('해시태그', p.hashtags.length + '개', 'ha' + id); }
    if (p.chapters && p.chapters.length) {
      payload['ch' + id] = p.chapters.map(function (c) { return c.time + ' ' + c.label; }).join('\n');
      h += rowHtml('챕터', p.chapters.length + '줄', 'ch' + id);
    }

    if (p.warnings && p.warnings.length) {
      h += '<div class="st-warn"><b>확인 ' + p.warnings.length + '건</b><br>' +
           p.warnings.map(function (w) { return '· ' + esc(w); }).join('<br>') + '</div>';
    }

    var noLink = !p.hid_top1 || !p.hid_top2 || !p.hid_top3;
    if (noLink && p.status !== 'published') {
      h += '<div class="st-warn" style="border-color:#E24B4A"><b>아고다 링크가 없습니다</b><br>' +
           '원고 안 링크에는 hid 가 없습니다. 아고다 파트너 허브에서 뽑은 링크 3개를 붙여넣어 주세요.</div>' +
           '<div class="st-pub" style="align-items:flex-start">' +
           '<textarea data-links="' + id + '" rows="3" placeholder="TOP1/2/3 파트너 링크를 그대로 붙여넣기"></textarea>' +
           '<button data-savelinks="' + id + '">링크 넣기</button></div>' +
           '<div class="st-msg" data-msg="' + id + '"></div>';
      return { html: h + '</div>', payload: payload };
    }

    if (p.status === 'published') {
      h += '<div class="st-done">발행 · ' + esc(p.published_by_email || '?') +
           (p.published_at ? ' · ' + p.published_at.slice(0, 10) : '') + '<br>' +
           '<a href="' + esc(p.youtube_url) + '" target="_blank" rel="noopener">' + esc(p.youtube_url) + '</a></div>';
    } else {
      var mine = p.claimed_by_email === ME;
      if (p.claimed_by_email && !mine) {
        h += '<div class="st-done">' + esc(p.claimed_by_email) + ' 님이 맡고 있습니다</div>';
      } else if (mine) {
        h += '<div class="st-pub"><input type="text" placeholder="youtube.com/watch?v=…" data-url="' + id + '" />' +
             '<button data-publish="' + id + '">발행 완료</button>' +
             '<button data-unclaim="' + id + '">놓기</button></div>' +
             '<div class="st-msg" data-msg="' + id + '"></div>';
      } else {
        h += '<div class="st-pub"><button data-claim="' + id + '">내가 맡기</button></div>' +
             '<div class="st-msg" data-msg="' + id + '"></div>';
      }
    }
    return { html: h + '</div>', payload: payload };
  }

  function render() {
    var list = document.getElementById('st-list');
    var mine = rows.filter(function (r) { return r.channel_code === tab; });
    if (!mine.length) {
      list.innerHTML = '<div class="st-empty">이 채널에 원고가 없습니다.<br>위에서 docx 를 넣으면 여기 나타납니다.</div>';
      return;
    }

    var html = '', store = {};
    mine.forEach(function (p) { var c = cardHtml(p); html += c.html; Object.assign(store, c.payload); });
    list.innerHTML = html;

    list.querySelectorAll('[data-copy]').forEach(function (b) { b.onclick = function () { copy(b, store[b.dataset.copy]); }; });
    list.querySelectorAll('[data-publish]').forEach(function (b) { b.onclick = function () { publish(b.dataset.publish); }; });
    list.querySelectorAll('[data-claim]').forEach(function (b) { b.onclick = function () { act(b.dataset.claim, 'claim', b); }; });
    list.querySelectorAll('[data-unclaim]').forEach(function (b) { b.onclick = function () { act(b.dataset.unclaim, 'unclaim', b); }; });
    list.querySelectorAll('[data-savelinks]').forEach(function (b) { b.onclick = function () { saveLinks(b.dataset.savelinks, b); }; });
  }

  /** 아고다 파트너 링크 3개 붙여넣기 */
  function saveLinks(id, btn) {
    var ta = document.querySelector('[data-links="' + id + '"]');
    var msg = document.querySelector('[data-msg="' + id + '"]');
    btn.disabled = true; msg.className = 'st-msg'; msg.textContent = '확인 중…';
    fetch('/api/publications', {
      method: 'PATCH', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, action: 'links', links_text: ta.value })
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (x) {
        if (!x.ok || !x.j.ok) throw new Error(x.j.error || '실패했습니다.');
        msg.className = 'st-msg ok';
        msg.textContent = '링크를 넣었습니다. 설명란을 다시 만들려면 원고를 한 번 더 넣어주세요.';
        var i = rows.findIndex(function (r) { return r.id === id; });
        if (i >= 0) rows[i] = x.j.row;
        setTimeout(render, 900);
      })
      .catch(function (e) { btn.disabled = false; msg.className = 'st-msg err'; msg.textContent = e.message; });
  }

  /** 맡기 / 놓기 */
  function act(id, action, btn) {
    var msg = document.querySelector('[data-msg="' + id + '"]');
    btn.disabled = true; msg.className = 'st-msg'; msg.textContent = '…';
    fetch('/api/publications', {
      method: 'PATCH', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, action: action })
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (x) {
        if (!x.ok || !x.j.ok) throw new Error(x.j.error || '실패했습니다.');
        var i = rows.findIndex(function (r) { return r.id === id; });
        if (i >= 0) rows[i] = x.j.row;
        render();
      })
      .catch(function (e) { btn.disabled = false; msg.className = 'st-msg err'; msg.textContent = e.message; });
  }

  function publish(id) {
    var input = document.querySelector('[data-url="' + id + '"]');
    var msg = document.querySelector('[data-msg="' + id + '"]');
    var btn = document.querySelector('[data-publish="' + id + '"]');
    msg.className = 'st-msg'; msg.textContent = '확인 중…'; btn.disabled = true;

    fetch('/api/publications', {
      method: 'PATCH', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: id, youtube_url: (input.value || '').trim() })
    }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
      .then(function (x) {
        if (!x.ok || !x.j.ok) throw new Error(x.j.error || '발행하지 못했습니다.');
        msg.className = 'st-msg ok'; msg.textContent = '발행됐습니다.';
        var i = rows.findIndex(function (r) { return r.id === id; });
        if (i >= 0) rows[i] = x.j.row;
        setTimeout(function () { drawTabs(); render(); }, 700);
      })
      .catch(function (e) { btn.disabled = false; msg.className = 'st-msg err'; msg.textContent = e.message; });
  }

  function drawTabs() {
    var codes = [];
    rows.forEach(function (r) { if (codes.indexOf(r.channel_code) < 0) codes.push(r.channel_code); });
    if (!codes.length) codes = ['TW', 'HT', 'HG'];
    if (!tab || codes.indexOf(tab) < 0) tab = codes[0];
    document.getElementById('st-tabs').innerHTML = codes.map(function (c) {
      var n = rows.filter(function (r) { return r.channel_code === c && r.status === 'draft'; }).length;
      return '<button class="st-tab' + (c === tab ? ' on' : '') + '" data-tab="' + c + '">' +
             esc(channels[c] || c) + (n ? ' · ' + n : '') + '</button>';
    }).join('');
    document.querySelectorAll('[data-tab]').forEach(function (b) {
      b.onclick = function () { tab = b.dataset.tab; drawTabs(); render(); };
    });
  }

  var CH = { TW: '여행능력자들', HT: '호텔이야', HG: '호텔이곳' };
  channels = CH;

  function load() {
    return fetch('/api/publications', { credentials: 'same-origin' })
      .then(function (r) { return r.json(); })
      .then(function (j) {
        if (!j.ok) throw new Error(j.error || '불러오지 못했습니다.');
        rows = j.rows || [];
        ME = j.me || null;
        var wait = rows.filter(function (r) { return r.status === 'draft'; }).length;
        document.getElementById('st-who').textContent = (ME || '') + ' · 대기 ' + wait + ' · 발행 ' + (rows.length - wait);
        // 관리자·대표님만 admin 버튼이 보인다. editor 는 눌러도 튕기므로 아예 감춘다.
        if (j.is_admin) { document.getElementById('st-admin').style.display = ''; }
        drawTabs(); render();
      })
      .catch(function (e) {
        document.getElementById('st-list').innerHTML = '<div class="st-empty">' + esc(e.message) + '</div>';
      });
  }
  load();

  /* ── 원고 넣기 ────────────────────────────────────────────────
     docx 는 3~4MB 다. 통째로 보내면 서버가 못 받는다 (4.5MB 한도).
     브라우저에서 word/document.xml 만 풀어 글자만 보낸다. 2KB 면 된다. */
  function docxToText(buf) {
    var files = fflate.unzipSync(new Uint8Array(buf));
    var xml = files['word/document.xml'];
    if (!xml) throw new Error('docx 안에서 본문을 찾지 못했습니다.');
    var t = fflate.strFromU8(xml);
    return t.replace(/<w:tab\b[^>]*\/>/g, '\t')
            .replace(/<w:br\b[^>]*\/>/g, '\n')
            .replace(/<\/w:p>/g, '\n')
            .replace(/<[^>]+>/g, '')
            .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>')
            .replace(/&quot;/g, '"').replace(/&#39;/g, "'");
  }

  function readFile(f) {
    return new Promise(function (res, rej) {
      var r = new FileReader();
      r.onload = function () { res(r.result); };
      r.onerror = function () { rej(new Error(f.name + ' 을 읽지 못했습니다.')); };
      r.readAsArrayBuffer(f);
    });
  }

  document.getElementById('st-go').onclick = function () {
    var input = document.getElementById('st-file');
    var msg = document.getElementById('st-upmsg');
    var btn = this;
    var files = Array.prototype.slice.call(input.files || []);
    msg.className = 'st-msg';
    if (!files.length) { msg.className = 'st-msg err'; msg.textContent = '원고 파일을 골라주세요.'; return; }

    btn.disabled = true;
    var done = 0, fails = [];

    (function next(i) {
      if (i >= files.length) {
        btn.disabled = false; input.value = '';
        msg.className = fails.length ? 'st-msg err' : 'st-msg ok';
        msg.textContent = done + '건 처리' + (fails.length ? ' · 실패 ' + fails.length + '건: ' + fails.join(' / ') : '');
        load();
        return;
      }
      var f = files[i];
      msg.textContent = '(' + (i + 1) + '/' + files.length + ') ' + f.name + ' 처리 중…';

      readFile(f).then(function (buf) {
        var text;
        try { text = docxToText(buf); } catch (e) { throw new Error(f.name + ': ' + e.message); }
        return fetch('/api/publications', {
          method: 'POST', credentials: 'same-origin',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: f.name, text: text })
        });
      }).then(function (r) { return r.json().then(function (j) { return { ok: r.ok, j: j }; }); })
        .then(function (x) {
          if (!x.ok || !x.j.ok) throw new Error(f.name + ': ' + (x.j.error || '실패'));
          done += 1;
        })
        .catch(function (e) { fails.push(e.message.slice(0, 60)); })
        .then(function () { next(i + 1); });
    })(0);
  };

  document.getElementById('st-logout').onclick = function () {
    if (window.TW && window.TW.sb) { window.TW.sb.auth.signOut(); }
    document.cookie = 'sb-access-token=; Max-Age=0; path=/';
    location.href = '/admin-login.html';
  };
})();
</script>
</body>
</html>
